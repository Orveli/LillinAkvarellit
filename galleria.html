<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lillin Akvarellit</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0908; }
  canvas#c { display: block; width: 100%; height: 100%; }

  #title {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 50; pointer-events: none;
    transition: opacity 1.5s;
  }
  #title.hidden { opacity: 0; }
  #title h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300; font-size: clamp(2rem, 6vw, 5rem);
    color: #d8cec2; letter-spacing: 0.25em;
    opacity: 0; animation: fi 2s ease-out 0.3s forwards;
  }
  #title .sub {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300; font-style: italic;
    font-size: clamp(0.65rem, 1.3vw, 0.9rem);
    color: #4a4038; letter-spacing: 0.15em;
    margin-top: 1.2rem; opacity: 0;
    animation: fi 2s ease-out 1.2s forwards;
  }
  @keyframes fi { to { opacity: 1; } }

  #counter {
    position: fixed; bottom: 1.5rem; left: 50%;
    transform: translateX(-50%);
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.7rem; letter-spacing: 0.3em;
    color: rgba(200,180,160,0.3);
    z-index: 100; pointer-events: none;
    font-variant-numeric: tabular-nums;
  }

  #loader {
    position: fixed; inset: 0; background: #0a0908;
    z-index: 9999; display: flex;
    align-items: center; justify-content: center;
    transition: opacity 1s;
  }
  #loader.gone { opacity: 0; pointer-events: none; }
  #loader p {
    font-family: 'Cormorant Garamond', serif;
    color: #3a342e; font-size: 0.8rem;
    letter-spacing: 0.4em; font-weight: 300;
  }

  /* ===== SETTINGS PANEL ===== */
  #panel {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 320px;
    background: rgba(15,13,11,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-left: 1px solid rgba(200,180,160,0.1);
    z-index: 200;
    overflow-y: auto;
    padding: 1.2rem 1rem;
    font-family: -apple-system, system-ui, sans-serif;
    font-size: 11px;
    color: #a09080;
    transform: translateX(100%);
    transition: transform 0.35s ease;
    scrollbar-width: thin;
    scrollbar-color: #3a3028 transparent;
  }
  #panel.open { transform: translateX(0); }
  #panel::-webkit-scrollbar { width: 4px; }
  #panel::-webkit-scrollbar-thumb { background: #3a3028; border-radius: 2px; }

  #panel h2 {
    font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.15em;
    color: #c8b8a4; margin: 1.2rem 0 0.6rem; padding-bottom: 0.3rem;
    border-bottom: 1px solid rgba(200,180,160,0.1);
  }
  #panel h2:first-child { margin-top: 0; }

  .ctrl { display: flex; align-items: center; gap: 8px; margin: 0.4rem 0; }
  .ctrl label { flex: 0 0 90px; font-size: 10px; color: #8a7a6a; }
  .ctrl input[type="range"] {
    flex: 1; height: 3px; -webkit-appearance: none; appearance: none;
    background: #2a2420; border-radius: 2px; outline: none;
  }
  .ctrl input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 12px; height: 12px;
    background: #c8b8a4; border-radius: 50%; cursor: pointer;
  }
  .ctrl .val {
    flex: 0 0 36px; text-align: right; font-size: 10px;
    color: #6a5e52; font-variant-numeric: tabular-nums;
  }

  .toggle { display: flex; align-items: center; gap: 8px; margin: 0.35rem 0; }
  .toggle label { flex: 1; font-size: 10px; color: #8a7a6a; cursor: pointer; }
  .toggle input { display: none; }
  .toggle .sw {
    width: 28px; height: 14px; background: #2a2420;
    border-radius: 7px; position: relative; cursor: pointer;
    transition: background 0.2s;
  }
  .toggle .sw::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 10px; height: 10px; background: #5a5048;
    border-radius: 50%; transition: all 0.2s;
  }
  .toggle input:checked + .sw { background: #4a6a4a; }
  .toggle input:checked + .sw::after { left: 16px; background: #8ac88a; }

  /* Curve editor */
  #curveWrap {
    margin: 0.6rem 0; position: relative;
    background: #1a1714; border-radius: 4px; overflow: hidden;
  }
  #curveCanvas { display: block; cursor: crosshair; width: 100%; height: 180px; }

  .hint {
    text-align: center; font-size: 9px; color: #4a4038;
    margin-top: 0.5rem; letter-spacing: 0.1em;
  }

  .panel-btns {
    display: flex; gap: 8px; margin-top: 1rem; padding-top: 0.8rem;
    border-top: 1px solid #2a2420;
  }
  .panel-btns button {
    flex: 1; padding: 6px 0; border: none; border-radius: 4px;
    font-family: -apple-system, system-ui, sans-serif;
    font-size: 10px; letter-spacing: 0.1em; cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  #btnSave { background: #4a6a4a; color: #c8e8c8; }
  #btnSave:hover { background: #5a8a5a; }
  #btnSave.saved { background: #3a5a3a; color: #8ac88a; }
  #btnReset { background: #2a2420; color: #8a7a6a; }
  #btnReset:hover { background: #3a3028; color: #c8b8a4; }

  /* Progress preview bar */
  #progBar {
    margin: 0.8rem 0 0.3rem;
    height: 4px; background: #1a1714; border-radius: 2px; overflow: hidden;
  }
  #progFill { height: 100%; background: #c8b8a4; width: 0%; transition: width 0.05s; }

  /* Toggle button hint */
  #panelHint {
    position: fixed; top: 1rem; right: 1rem;
    font-family: -apple-system, system-ui, sans-serif;
    font-size: 10px; color: #3a342e; letter-spacing: 0.1em;
    z-index: 100; pointer-events: none;
    transition: opacity 0.5s;
  }
</style>
</head>
<body>

<div id="loader"><p>LADATAAN</p></div>
<canvas id="c"></canvas>
<div id="title">
  <h1>Lillin Akvarellit</h1>
  <p class="sub">scrollaa sukeltaaksesi</p>
</div>
<div id="counter"></div>
<div id="panelHint">[ S ] asetukset</div>

<!-- ===== SETTINGS PANEL ===== -->
<div id="panel">
  <h2>Transitio</h2>
  <div id="progBar"><div id="progFill"></div></div>

  <div class="ctrl"><label>Scroll-nopeus</label><input type="range" id="sSpeed" min="0.0002" max="0.005" step="0.0001" value="0.001"><span class="val"></span></div>
  <div class="ctrl"><label>Lerp (smooth)</label><input type="range" id="sLerp" min="0.01" max="0.25" step="0.005" value="0.06"><span class="val"></span></div>
  <div class="ctrl"><label>Noise-skaala</label><input type="range" id="sNoiseScale" min="0.5" max="12" step="0.1" value="3.5"><span class="val"></span></div>
  <div class="ctrl"><label>Noise-nopeus</label><input type="range" id="sNoiseSpeed" min="0" max="2" step="0.05" value="0.3"><span class="val"></span></div>
  <div class="ctrl"><label>Noise-määrä</label><input type="range" id="sNoiseAmp" min="0" max="0.4" step="0.005" value="0.1"><span class="val"></span></div>
  <div class="ctrl"><label>Reuna-feather</label><input type="range" id="sFeather" min="0.01" max="0.3" step="0.005" value="0.06"><span class="val"></span></div>
  <div class="ctrl"><label>Radius-kerroin</label><input type="range" id="sRadius" min="0.8" max="2.0" step="0.05" value="1.3"><span class="val"></span></div>
  <div class="ctrl"><label>Next-aloituskoko</label><input type="range" id="sNextScale" min="0.01" max="0.5" step="0.01" value="0.08"><span class="val"></span></div>

  <h2>Zoom</h2>
  <div class="ctrl"><label>Zoom-teho</label><input type="range" id="sZoomPow" min="1.5" max="40" step="0.5" value="7"><span class="val"></span></div>
  <div class="ctrl"><label>Barrel</label><input type="range" id="sBarrel" min="0" max="1.0" step="0.01" value="0.15"><span class="val"></span></div>
  <div class="ctrl"><label>Parallaksi</label><input type="range" id="sParallax" min="0" max="0.06" step="0.002" value="0.015"><span class="val"></span></div>
  <div class="ctrl"><label>Zoom mouse</label><input type="range" id="sZoomMouse" min="0" max="0.4" step="0.005" value="0.06"><span class="val"></span></div>

  <h2>Efektit</h2>
  <div class="toggle"><label>Kromaattinen aberraatio</label><input type="checkbox" id="tAber" checked><span class="sw" onclick="this.previousElementSibling.click()"></span></div>
  <div class="ctrl"><label>Aber. määrä</label><input type="range" id="sAber" min="0" max="0.06" step="0.001" value="0.015"><span class="val"></span></div>

  <div class="toggle"><label>Vinjetti</label><input type="checkbox" id="tVig" checked><span class="sw" onclick="this.previousElementSibling.click()"></span></div>
  <div class="ctrl"><label>Vig. tummuus</label><input type="range" id="sVig" min="0" max="1" step="0.02" value="0.55"><span class="val"></span></div>

  <div class="toggle"><label>Filmirae</label><input type="checkbox" id="tGrain" checked><span class="sw" onclick="this.previousElementSibling.click()"></span></div>
  <div class="ctrl"><label>Rae-määrä</label><input type="range" id="sGrain" min="0" max="0.08" step="0.002" value="0.025"><span class="val"></span></div>

  <div class="toggle"><label>Mouse glow</label><input type="checkbox" id="tGlow" checked><span class="sw" onclick="this.previousElementSibling.click()"></span></div>
  <div class="ctrl"><label>Glow-määrä</label><input type="range" id="sGlow" min="0" max="1" step="0.02" value="0.25"><span class="val"></span></div>

  <div class="toggle"><label>Värigreidaus</label><input type="checkbox" id="tColor" checked><span class="sw" onclick="this.previousElementSibling.click()"></span></div>

  <h2>Transition Curve</h2>
  <div id="curveWrap"><canvas id="curveCanvas"></canvas></div>
  <p class="hint">Vedä pisteitä muokataksesi easingia</p>
  <button id="btnResetCurve" style="width:100%;margin-top:0.4rem;padding:4px 0;border:none;border-radius:3px;background:#2a2420;color:#8a7a6a;font-size:9px;letter-spacing:0.1em;cursor:pointer;font-family:-apple-system,system-ui,sans-serif;">RESET CURVE</button>

  <div class="panel-btns">
    <button id="btnSave">TALLENNA</button>
    <button id="btnReset">PALAUTA OLETUS</button>
  </div>
</div>

<!-- =================== SHADERS =================== -->
<script id="vs" type="x-shader/x-vertex">
attribute vec2 aPos;
varying vec2 vUv;
void main() {
  vUv = aPos * 0.5 + 0.5;
  gl_Position = vec4(aPos, 0.0, 1.0);
}
</script>

<script id="fs" type="x-shader/x-fragment">
precision highp float;

varying vec2 vUv;

uniform sampler2D uCurrent;
uniform sampler2D uNext;
uniform float uProgress;
uniform vec2 uMouse;
uniform float uTime;
uniform vec2 uResolution;
uniform vec2 uCurrentSize;
uniform vec2 uNextSize;

// Tweakable uniforms
uniform float uNoiseScale;
uniform float uNoiseSpeed;
uniform float uNoiseAmp;
uniform float uFeather;
uniform float uRadiusMult;
uniform float uNextStartScale;
uniform float uZoomPow;
uniform float uBarrelAmt;
uniform float uParallaxAmt;
uniform float uZoomMouse;
uniform float uAberAmt;     // 0 = off
uniform float uVigDark;     // 0 = off (value = darkest edge)
uniform float uGrainAmt;    // 0 = off
uniform float uGlowAmt;     // 0 = off
uniform float uColorGrade;  // 0 = off, 1 = on

// ---- Simplex noise ----
vec3 mod289(vec3 x) { return x - floor(x * (1.0/289.0)) * 289.0; }
vec2 mod289(vec2 x) { return x - floor(x * (1.0/289.0)) * 289.0; }
vec3 permute(vec3 x) { return mod289(((x*34.0)+1.0)*x); }

float snoise(vec2 v) {
  const vec4 C = vec4(0.211324865405187, 0.366025403784439,
                     -0.577350269189626, 0.024390243902439);
  vec2 i = floor(v + dot(v, C.yy));
  vec2 x0 = v - i + dot(i, C.xx);
  vec2 i1 = (x0.x > x0.y) ? vec2(1.0,0.0) : vec2(0.0,1.0);
  vec4 x12 = x0.xyxy + C.xxzz;
  x12.xy -= i1;
  i = mod289(i);
  vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0)) + i.x + vec3(0.0, i1.x, 1.0));
  vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
  m = m*m; m = m*m;
  vec3 x = 2.0 * fract(p * C.www) - 1.0;
  vec3 h = abs(x) - 0.5;
  vec3 a0 = x - floor(x + 0.5);
  m *= 1.79284291400159 - 0.85373472095314 * (a0*a0 + h*h);
  vec3 g;
  g.x = a0.x * x0.x + h.x * x0.y;
  g.yz = a0.yz * x12.xz + h.yz * x12.yw;
  return 130.0 * dot(m, g);
}

vec2 coverUv(vec2 uv, vec2 imgSize, vec2 screenSize) {
  uv.y = 1.0 - uv.y;
  float imgAspect = imgSize.x / imgSize.y;
  float screenAspect = screenSize.x / screenSize.y;
  vec2 scale = vec2(1.0);
  if (imgAspect > screenAspect) { scale.x = screenAspect / imgAspect; }
  else { scale.y = imgAspect / screenAspect; }
  return (uv - 0.5) * scale + 0.5;
}

vec2 barrel(vec2 uv, float amt) {
  vec2 cc = uv - 0.5;
  return uv + cc * dot(cc,cc) * amt;
}

void main() {
  vec2 uv = vUv;
  float p = clamp(uProgress, 0.0, 1.0);
  vec2 mOff = (uMouse - 0.5);
  vec2 parallax = mOff * uParallaxAmt;

  // ---- Current image: barrel + zoom ----
  float bAmt = -uBarrelAmt * p;
  vec2 curDistUv = barrel(uv, bAmt);
  float zoomFactor = pow(uZoomPow, p);
  vec2 zoomCenter = vec2(0.5) + mOff * uZoomMouse * p;
  vec2 currentUv = (curDistUv - zoomCenter) / zoomFactor + zoomCenter;
  currentUv += parallax * (1.0 - p);

  // ---- Next image: clean ----
  float nextScale = uNextStartScale + p * (1.0 - uNextStartScale);
  vec2 nextUv = (uv - 0.5) / nextScale + 0.5;
  nextUv += parallax * p;

  vec2 cUv = coverUv(currentUv, uCurrentSize, uResolution);
  vec2 nUv = coverUv(nextUv, uNextSize, uResolution);

  // ---- Boundary ----
  vec2 fromCenter = uv - 0.5;
  float dist = length(fromCenter);

  float n = snoise(fromCenter * uNoiseScale + uTime * uNoiseSpeed) * uNoiseAmp;
  n += snoise(fromCenter * uNoiseScale * 2.5 - uTime * uNoiseSpeed * 0.7) * uNoiseAmp * 0.5;

  float radius = p * uRadiusMult;
  float feath = uFeather + p * uFeather;
  float boundary = smoothstep(radius - feath, radius + feath, dist + n);

  // ---- Sample current ----
  float aberration = uAberAmt * p * (1.0 - p);
  vec2 aberDir = normalize(fromCenter + 0.001);

  vec3 curCol;
  if (cUv.x < 0.0 || cUv.x > 1.0 || cUv.y < 0.0 || cUv.y > 1.0) {
    curCol = vec3(0.04, 0.035, 0.03);
  } else if (aberration > 0.0005) {
    curCol.r = texture2D(uCurrent, cUv + aberDir * aberration).r;
    curCol.g = texture2D(uCurrent, cUv).g;
    curCol.b = texture2D(uCurrent, cUv - aberDir * aberration).b;
  } else {
    curCol = texture2D(uCurrent, cUv).rgb;
  }

  // ---- Sample next (CLAMP_TO_EDGE extends edge pixels instead of black) ----
  vec3 nxtCol = texture2D(uNext, clamp(nUv, 0.0, 1.0)).rgb;

  // ---- Constrain boundary to next image coverage ----
  // Don't reveal next image where it hasn't scaled up yet
  float edgeDist = min(min(nUv.x, 1.0 - nUv.x), min(nUv.y, 1.0 - nUv.y));
  float nextCoverage = smoothstep(-0.03, 0.05, edgeDist);
  float maskedBoundary = mix(1.0, boundary, nextCoverage);

  // ---- Mix ----
  vec3 col = mix(nxtCol, curCol, maskedBoundary);

  // ---- Mouse glow ----
  if (uGlowAmt > 0.0) {
    float md = length(uv - uMouse);
    col += exp(-md * md * 12.0) * p * (1.0 - p) * uGlowAmt;
  }

  // ---- Vignette ----
  if (uVigDark > 0.0) {
    float vig = 1.0 - dot(fromCenter * 1.1, fromCenter * 1.1);
    vig = smoothstep(0.0, 0.7, vig);
    col *= mix(1.0 - uVigDark, 1.0, vig);
  }

  // ---- Grain ----
  if (uGrainAmt > 0.0) {
    float grain = (snoise(uv * 500.0 + uTime * 10.0) * 0.5 + 0.5) * uGrainAmt;
    col += grain - uGrainAmt * 0.5;
  }

  // ---- Color grade ----
  if (uColorGrade > 0.5) {
    col = pow(col, vec3(0.95, 0.98, 1.02));
  }

  gl_FragColor = vec4(col, 1.0);
}
</script>

<!-- =================== MAIN JS =================== -->
<script>
// ===== SETTINGS OBJECT =====
const DEFAULTS = {
  speed: 0.001, lerp: 0.06, noiseScale: 3.5, noiseSpeed: 0.3,
  noiseAmp: 0.1, feather: 0.06, radius: 1.3, nextScale: 0.08,
  zoomPow: 7, barrel: 0.15, parallax: 0.015, zoomMouse: 0.06,
  aber: 0.015, aberOn: true, vig: 0.55, vigOn: true,
  grain: 0.025, grainOn: true, glow: 0.25, glowOn: true, colorOn: true,
};
const CURVE_DEFAULTS = {
  x1: 0.2, y1: 0.0,       // handle for start (0,0)
  mx: 0.5, my: 0.5,        // mid point (on curve)
  mhx: 0.35, mhy: 0.5,     // mid handle (left side; right side is mirrored)
  x2: 0.8, y2: 1.0,        // handle for end (1,1)
};

const STORAGE_KEY = 'lillinAkvarellit_settings';

function loadSavedSettings() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch { return null; }
}

const saved = loadSavedSettings();
const S = { ...DEFAULTS, ...(saved?.settings || {}) };

// ===== CURVE EDITOR =====
// Two-segment cubic bezier through a draggable mid point
// Seg1: (0,0) → (x1,y1) → (mhx,mhy) → (mx,my)
// Seg2: (mx,my) → (mirror of mh) → (x2,y2) → (1,1)
const curve = { ...CURVE_DEFAULTS, ...(saved?.curve || {}) };

function cubicB(t, p0, p1, p2, p3) {
  const mt = 1 - t;
  return mt*mt*mt*p0 + 3*mt*mt*t*p1 + 3*mt*t*t*p2 + t*t*t*p3;
}
function cubicBd(t, p0, p1, p2, p3) {
  const mt = 1 - t;
  return 3*mt*mt*(p1-p0) + 6*mt*t*(p2-p1) + 3*t*t*(p3-p2);
}
function solveT(x, xp0, xp1, xp2, xp3) {
  let t = 0.5;
  for (let i = 0; i < 12; i++) {
    const xAt = cubicB(t, xp0, xp1, xp2, xp3);
    const dx = cubicBd(t, xp0, xp1, xp2, xp3);
    if (Math.abs(dx) < 1e-7) break;
    t -= (xAt - x) / dx;
    t = Math.max(0, Math.min(1, t));
  }
  return t;
}

function applyCurve(x) {
  if (x <= 0) return 0;
  if (x >= 1) return 1;
  const mhxR = 2 * curve.mx - curve.mhx;
  const mhyR = 2 * curve.my - curve.mhy;
  if (x <= curve.mx) {
    const t = solveT(x, 0, curve.x1, curve.mhx, curve.mx);
    return cubicB(t, 0, curve.y1, curve.mhy, curve.my);
  } else {
    const t = solveT(x, curve.mx, mhxR, curve.x2, 1);
    return cubicB(t, curve.my, mhyR, curve.y2, 1);
  }
}

// ===== CURVE CANVAS =====
function initCurveEditor() {
  const canvas = document.getElementById('curveCanvas');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  const W = rect.width;
  const H = 180;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const pad = 16;
  const gw = W - pad * 2;
  const gh = H - pad * 2;

  function toScreen(x, y) { return [pad + x * gw, pad + (1 - y) * gh]; }
  function fromScreen(sx, sy) { return [(sx - pad) / gw, 1 - (sy - pad) / gh]; }

  // Draggable: 'cp1', 'cp2', 'mid', 'mh'
  let dragging = null;

  function draw(curveProgress) {
    ctx.clearRect(0, 0, W, H);
    const mhxR = 2 * curve.mx - curve.mhx;
    const mhyR = 2 * curve.my - curve.mhy;

    // Grid
    ctx.strokeStyle = '#1e1c1a';
    ctx.lineWidth = 1;
    for (let i = 0; i <= 4; i++) {
      const [x] = toScreen(i/4, 0);
      const [, y2] = toScreen(0, i/4);
      ctx.beginPath(); ctx.moveTo(x, pad); ctx.lineTo(x, pad + gh); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(pad, y2); ctx.lineTo(pad + gw, y2); ctx.stroke();
    }

    // Diagonal
    ctx.strokeStyle = '#2a2622';
    ctx.setLineDash([3, 3]);
    const [dx0, dy0] = toScreen(0, 0);
    const [dx1, dy1] = toScreen(1, 1);
    ctx.beginPath(); ctx.moveTo(dx0, dy0); ctx.lineTo(dx1, dy1); ctx.stroke();
    ctx.setLineDash([]);

    // Draw two bezier segments
    ctx.strokeStyle = '#c8b8a4';
    ctx.lineWidth = 2;
    ctx.beginPath();
    const [sx, sy] = toScreen(0, 0);
    ctx.moveTo(sx, sy);
    // Segment 1: (0,0) → (x1,y1) → (mhx,mhy) → (mx,my)
    for (let i = 1; i <= 40; i++) {
      const t = i / 40;
      const bx = cubicB(t, 0, curve.x1, curve.mhx, curve.mx);
      const by = cubicB(t, 0, curve.y1, curve.mhy, curve.my);
      const [px, py] = toScreen(bx, by);
      ctx.lineTo(px, py);
    }
    // Segment 2: (mx,my) → (mhxR,mhyR) → (x2,y2) → (1,1)
    for (let i = 1; i <= 40; i++) {
      const t = i / 40;
      const bx = cubicB(t, curve.mx, mhxR, curve.x2, 1);
      const by = cubicB(t, curve.my, mhyR, curve.y2, 1);
      const [px, py] = toScreen(bx, by);
      ctx.lineTo(px, py);
    }
    ctx.stroke();

    // Control lines
    ctx.strokeStyle = 'rgba(200,180,160,0.25)';
    ctx.lineWidth = 1;
    const [c1x, c1y] = toScreen(curve.x1, curve.y1);
    const [c2x, c2y] = toScreen(curve.x2, curve.y2);
    const [msx, msy] = toScreen(curve.mx, curve.my);
    const [mhsx, mhsy] = toScreen(curve.mhx, curve.mhy);
    const [mhrx, mhry] = toScreen(mhxR, mhyR);
    ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(c1x, c1y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(...toScreen(1,1)); ctx.lineTo(c2x, c2y); ctx.stroke();
    // Mid handle lines
    ctx.beginPath(); ctx.moveTo(mhsx, mhsy); ctx.lineTo(msx, msy); ctx.lineTo(mhrx, mhry); ctx.stroke();

    // Control points
    const points = [
      { x: c1x, y: c1y, id: 'cp1', r: 5, col: '#c8b8a4' },
      { x: c2x, y: c2y, id: 'cp2', r: 5, col: '#c8b8a4' },
      { x: mhsx, y: mhsy, id: 'mh', r: 4, col: '#8a9aaa' },
      { x: mhrx, y: mhry, id: 'mh_mirror', r: 3, col: '#5a6a7a' },
      { x: msx, y: msy, id: 'mid', r: 6, col: '#e8c888' },
    ];
    for (const pt of points) {
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, pt.r, 0, Math.PI * 2);
      ctx.fillStyle = (dragging === pt.id) ? '#fff' : pt.col;
      ctx.fill();
    }

    // Progress indicator
    if (curveProgress !== undefined && curveProgress > 0.001 && curveProgress < 0.999) {
      const cy = applyCurve(curveProgress);
      const [ix, iy] = toScreen(curveProgress, cy);
      ctx.beginPath();
      ctx.arc(ix, iy, 4, 0, Math.PI * 2);
      ctx.fillStyle = '#ff9060';
      ctx.fill();
    }
  }

  function hitTest(sx, sy) {
    const mhxR = 2 * curve.mx - curve.mhx;
    const mhyR = 2 * curve.my - curve.mhy;
    const pts = [
      { s: toScreen(curve.mx, curve.my), id: 'mid' },
      { s: toScreen(curve.mhx, curve.mhy), id: 'mh' },
      { s: toScreen(curve.x1, curve.y1), id: 'cp1' },
      { s: toScreen(curve.x2, curve.y2), id: 'cp2' },
    ];
    for (const p of pts) {
      if (Math.hypot(sx - p.s[0], sy - p.s[1]) < 14) return p.id;
    }
    return null;
  }

  canvas.addEventListener('mousedown', (e) => {
    const r = canvas.getBoundingClientRect();
    dragging = hitTest(e.clientX - r.left, e.clientY - r.top);
  });

  window.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const r = canvas.getBoundingClientRect();
    const [nx, ny] = fromScreen(e.clientX - r.left, e.clientY - r.top);
    const cx = Math.max(0, Math.min(1, nx));
    const cy = Math.max(0, Math.min(1, ny));
    if (dragging === 'cp1') { curve.x1 = Math.min(cx, curve.mx); curve.y1 = cy; }
    else if (dragging === 'cp2') { curve.x2 = Math.max(cx, curve.mx); curve.y2 = cy; }
    else if (dragging === 'mid') {
      const dx = cx - curve.mx, dy = cy - curve.my;
      curve.mx = Math.max(0.05, Math.min(0.95, cx));
      curve.my = Math.max(0, Math.min(1, cy));
      curve.mhx = Math.max(0, Math.min(1, curve.mhx + dx));
      curve.mhy = Math.max(0, Math.min(1, curve.mhy + dy));
    }
    else if (dragging === 'mh') { curve.mhx = Math.max(0, Math.min(curve.mx, cx)); curve.mhy = cy; }
  });

  window.addEventListener('mouseup', () => { dragging = null; });

  // Reset curve button
  document.getElementById('btnResetCurve').addEventListener('click', () => {
    Object.assign(curve, CURVE_DEFAULTS);
  });

  return draw;
}

// ===== BIND SLIDERS =====
function bindSliders() {
  const map = {
    sSpeed: 'speed', sLerp: 'lerp', sNoiseScale: 'noiseScale',
    sNoiseSpeed: 'noiseSpeed', sNoiseAmp: 'noiseAmp', sFeather: 'feather',
    sRadius: 'radius', sNextScale: 'nextScale', sZoomPow: 'zoomPow',
    sBarrel: 'barrel', sParallax: 'parallax', sZoomMouse: 'zoomMouse',
    sAber: 'aber', sVig: 'vig', sGrain: 'grain', sGlow: 'glow',
  };
  const toggleMap = {
    tAber: 'aberOn', tVig: 'vigOn', tGrain: 'grainOn', tGlow: 'glowOn', tColor: 'colorOn',
  };

  for (const [id, key] of Object.entries(map)) {
    const el = document.getElementById(id);
    const valEl = el.parentElement.querySelector('.val');
    el.value = S[key];
    valEl.textContent = Number(S[key]).toFixed(3);
    el.addEventListener('input', () => {
      S[key] = parseFloat(el.value);
      valEl.textContent = Number(S[key]).toFixed(3);
    });
  }
  for (const [id, key] of Object.entries(toggleMap)) {
    const el = document.getElementById(id);
    el.checked = S[key];
    el.addEventListener('change', () => { S[key] = el.checked; });
  }

  // Save button
  document.getElementById('btnSave').addEventListener('click', () => {
    const data = { settings: { ...S }, curve: { ...curve } };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    const btn = document.getElementById('btnSave');
    btn.textContent = 'TALLENNETTU ✓';
    btn.classList.add('saved');
    setTimeout(() => { btn.textContent = 'TALLENNA'; btn.classList.remove('saved'); }, 1500);
  });

  // Reset button
  document.getElementById('btnReset').addEventListener('click', () => {
    localStorage.removeItem(STORAGE_KEY);
    Object.assign(S, DEFAULTS);
    Object.assign(curve, CURVE_DEFAULTS);
    // Update all sliders and toggles
    for (const [id, key] of Object.entries(map)) {
      const el = document.getElementById(id);
      const valEl = el.parentElement.querySelector('.val');
      el.value = S[key];
      valEl.textContent = Number(S[key]).toFixed(3);
    }
    for (const [id, key] of Object.entries(toggleMap)) {
      document.getElementById(id).checked = S[key];
    }
  });
}

// ===== MAIN =====
function shuffle(arr, seed) {
  let s = seed; const a = [...arr];
  const rng = () => { s=(s*1103515245+12345)&0x7fffffff; return s/0x7fffffff; };
  for (let i=a.length-1;i>0;i--) { const j=Math.floor(rng()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

async function init() {
  const catalog = await (await fetch('catalog.json')).json();
  const paintings = shuffle(catalog, 42);
  const total = paintings.length;

  const canvas = document.getElementById('c');
  const gl = canvas.getContext('webgl', { antialias: false, alpha: false });
  if (!gl) { alert('WebGL ei tuettu'); return; }

  function resize() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    gl.viewport(0, 0, canvas.width, canvas.height);
  }
  resize();
  window.addEventListener('resize', resize);

  function compileShader(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) { console.error(gl.getShaderInfoLog(s)); return null; }
    return s;
  }

  const vs = compileShader(gl.VERTEX_SHADER, document.getElementById('vs').textContent);
  const fs = compileShader(gl.FRAGMENT_SHADER, document.getElementById('fs').textContent);
  const prog = gl.createProgram();
  gl.attachShader(prog, vs); gl.attachShader(prog, fs);
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) { console.error(gl.getProgramInfoLog(prog)); return; }
  gl.useProgram(prog);

  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const aPos = gl.getAttribLocation(prog, 'aPos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  // All uniform locations
  const U = {};
  ['uCurrent','uNext','uProgress','uMouse','uTime','uResolution','uCurrentSize','uNextSize',
   'uNoiseScale','uNoiseSpeed','uNoiseAmp','uFeather','uRadiusMult','uNextStartScale',
   'uZoomPow','uBarrelAmt','uParallaxAmt','uZoomMouse',
   'uAberAmt','uVigDark','uGrainAmt','uGlowAmt','uColorGrade'
  ].forEach(name => { U[name] = gl.getUniformLocation(prog, name); });

  // Texture loading
  const texCache = {};
  function loadTexture(idx) {
    const i = ((idx % total) + total) % total;
    if (texCache[i]) return texCache[i];
    const tex = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE, new Uint8Array([10,9,8,255]));
    const entry = { tex, width: 1, height: 1, ready: false };
    texCache[i] = entry;
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      gl.bindTexture(gl.TEXTURE_2D, tex);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
      entry.width = img.naturalWidth; entry.height = img.naturalHeight; entry.ready = true;
    };
    img.src = `akvarellit/${paintings[i].filename}`;
    return entry;
  }

  [0,1,2,3].forEach(i => loadTexture(i));
  await new Promise(resolve => {
    const check = () => {
      if (texCache[0]?.ready && texCache[1]?.ready) resolve();
      else setTimeout(check, 50);
    }; check();
  });
  document.getElementById('loader').classList.add('gone');

  // Init UI
  bindSliders();
  const drawCurve = initCurveEditor();

  // Panel toggle
  const panel = document.getElementById('panel');
  const panelHint = document.getElementById('panelHint');
  let panelOpen = false;
  window.addEventListener('keydown', (e) => {
    if (e.key === 's' || e.key === 'S') {
      if (e.metaKey || e.ctrlKey) return; // don't hijack save
      panelOpen = !panelOpen;
      panel.classList.toggle('open', panelOpen);
      panelHint.style.opacity = panelOpen ? '0' : '1';
      e.preventDefault();
    }
  });

  // State
  let currentIndex = 0;
  let progress = 0, targetProgress = 0;
  let mouseX = 0.5, mouseY = 0.5;
  let smoothMouseX = 0.5, smoothMouseY = 0.5;
  let titleHidden = false;
  const titleEl = document.getElementById('title');
  const counterEl = document.getElementById('counter');
  const progFill = document.getElementById('progFill');

  // Input
  window.addEventListener('wheel', (e) => {
    if (panelOpen && e.target.closest('#panel')) return; // allow panel scroll
    e.preventDefault();
    targetProgress += e.deltaY * S.speed;
    if (currentIndex === 0 && targetProgress < 0) targetProgress = 0;
    if (currentIndex >= total - 2 && targetProgress > 1) targetProgress = 1;
  }, { passive: false });

  let touchY = 0;
  window.addEventListener('touchstart', (e) => { touchY = e.touches[0].clientY; }, { passive: true });
  window.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const dy = touchY - e.touches[0].clientY; touchY = e.touches[0].clientY;
    targetProgress += dy * S.speed * 4;
    if (currentIndex === 0 && targetProgress < 0) targetProgress = 0;
    if (currentIndex >= total - 2 && targetProgress > 1) targetProgress = 1;
  }, { passive: false });

  window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowDown' || e.key === 'ArrowRight' || e.key === ' ') {
      targetProgress += 0.12; e.preventDefault();
    }
    if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
      targetProgress -= 0.12; e.preventDefault();
    }
    if (currentIndex === 0 && targetProgress < 0) targetProgress = 0;
  });

  window.addEventListener('mousemove', (e) => {
    mouseX = e.clientX / window.innerWidth;
    mouseY = 1.0 - e.clientY / window.innerHeight;
  });

  // Render
  const startTime = performance.now();

  function render() {
    requestAnimationFrame(render);

    progress += (targetProgress - progress) * S.lerp;
    if (Math.abs(targetProgress - progress) < 0.0005) progress = targetProgress;

    smoothMouseX += (mouseX - smoothMouseX) * 0.05;
    smoothMouseY += (mouseY - smoothMouseY) * 0.05;

    if (progress > 0.999 && targetProgress >= 1.0 && currentIndex < total - 2) {
      currentIndex++; progress -= 1.0; targetProgress -= 1.0;
      loadTexture(currentIndex + 2); loadTexture(currentIndex + 3);
    } else if (progress < 0.001 && targetProgress <= 0.0 && currentIndex > 0) {
      currentIndex--; progress += 1.0; targetProgress += 1.0;
    }
    progress = Math.max(0, Math.min(1, progress));

    // Apply curve
    const curvedP = applyCurve(progress);

    if (progress > 0.03 && !titleHidden) { titleEl.classList.add('hidden'); titleHidden = true; }

    const ci = ((currentIndex % total) + total) % total;
    const ni = (((currentIndex + 1) % total) + total) % total;
    const curTex = texCache[ci] || loadTexture(ci);
    const nxtTex = texCache[ni] || loadTexture(ni);

    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, curTex.tex);
    gl.uniform1i(U.uCurrent, 0);
    gl.activeTexture(gl.TEXTURE1);
    gl.bindTexture(gl.TEXTURE_2D, nxtTex.tex);
    gl.uniform1i(U.uNext, 1);

    gl.uniform1f(U.uProgress, curvedP);
    gl.uniform2f(U.uMouse, smoothMouseX, smoothMouseY);
    gl.uniform1f(U.uTime, (performance.now() - startTime) * 0.001);
    gl.uniform2f(U.uResolution, canvas.width, canvas.height);
    gl.uniform2f(U.uCurrentSize, curTex.width, curTex.height);
    gl.uniform2f(U.uNextSize, nxtTex.width, nxtTex.height);

    // Tweakable uniforms
    gl.uniform1f(U.uNoiseScale, S.noiseScale);
    gl.uniform1f(U.uNoiseSpeed, S.noiseSpeed);
    gl.uniform1f(U.uNoiseAmp, S.noiseAmp);
    gl.uniform1f(U.uFeather, S.feather);
    gl.uniform1f(U.uRadiusMult, S.radius);
    gl.uniform1f(U.uNextStartScale, S.nextScale);
    gl.uniform1f(U.uZoomPow, S.zoomPow);
    gl.uniform1f(U.uBarrelAmt, S.barrel);
    gl.uniform1f(U.uParallaxAmt, S.parallax);
    gl.uniform1f(U.uZoomMouse, S.zoomMouse);
    gl.uniform1f(U.uAberAmt, S.aberOn ? S.aber : 0.0);
    gl.uniform1f(U.uVigDark, S.vigOn ? S.vig : 0.0);
    gl.uniform1f(U.uGrainAmt, S.grainOn ? S.grain : 0.0);
    gl.uniform1f(U.uGlowAmt, S.glowOn ? S.glow : 0.0);
    gl.uniform1f(U.uColorGrade, S.colorOn ? 1.0 : 0.0);

    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

    // UI updates
    counterEl.textContent = `${currentIndex + 1} / ${total}`;
    progFill.style.width = (progress * 100) + '%';
    if (panelOpen) drawCurve(progress);
  }

  requestAnimationFrame(render);
}

init();
</script>
