<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lillin Akvarellit</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0908; }
  canvas#c { display: block; width: 100%; height: 100%; }

  #title {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 50;
    background: #0a0908;
  }
  #title.hidden { opacity: 0; pointer-events: none; }
  #title h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300; font-size: clamp(3rem, 8vw, 7rem);
    color: #d8cec2; letter-spacing: 0.3em;
    opacity: 0; animation: fi 2s ease-out 0.3s forwards;
  }
  #title.shown h1, #title.shown .sub, #title.shown #musicBtn, #title.shown #scrollHint {
    animation: none; opacity: 1;
  }
  #title .sub {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300; font-style: italic;
    font-size: clamp(1rem, 2.5vw, 1.8rem);
    color: #6a5e52; letter-spacing: 0.15em;
    margin-top: 0.5rem; opacity: 0;
    animation: fi 2s ease-out 1.2s forwards;
  }
  #musicBtn {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300; font-size: clamp(0.7rem, 1.2vw, 0.9rem);
    color: #4a4038; letter-spacing: 0.2em;
    background: none; border: 1px solid #3a342e;
    padding: 0.5em 1.5em; margin-top: 2.5rem;
    cursor: pointer; opacity: 0;
    animation: fi 2s ease-out 1.8s forwards;
    transition: color 0.3s, border-color 0.3s;
  }
  #musicBtn:hover { color: #d8cec2; border-color: #6a5e52; }
  #musicBtn.playing { color: #6a8a6a; border-color: #4a6a4a; }
  #scrollHint {
    position: absolute; bottom: 2.5rem; left: 50%;
    transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center;
    gap: 0.5rem; opacity: 0;
    animation: fi 2s ease-out 2.4s forwards;
  }
  #scrollHint span {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300; font-size: clamp(1rem, 2vw, 1.4rem);
    color: #4a4038; letter-spacing: 0.25em;
  }
  #scrollHint .arrow {
    font-size: 2rem; color: #4a4038;
    animation: bounce 2s ease-in-out 3s infinite;
  }
  @keyframes fi { to { opacity: 1; } }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(6px); }
  }

  #loader {
    position: fixed; inset: 0; background: #0a0908;
    z-index: 9999; display: flex;
    align-items: center; justify-content: center;
    transition: opacity 1s;
  }
  #loader.gone { opacity: 0; pointer-events: none; }
  #loader p {
    font-family: 'Cormorant Garamond', serif;
    color: #3a342e; font-size: 0.8rem;
    letter-spacing: 0.4em; font-weight: 300;
  }

  /* ===== PANEL-OPEN LAYOUT SHIFT ===== */
  #title { transition: opacity 1.5s, right 0.35s ease; }
  body.panel-open #title { right: 320px; }


  /* ===== SETTINGS PANEL ===== */
  #panel {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 320px;
    background: rgba(15,13,11,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-left: 1px solid rgba(200,180,160,0.1);
    z-index: 200;
    overflow-y: auto;
    padding: 1.2rem 1rem;
    font-family: -apple-system, system-ui, sans-serif;
    font-size: 11px;
    color: #a09080;
    transform: translateX(100%);
    transition: transform 0.35s ease;
    scrollbar-width: thin;
    scrollbar-color: #3a3028 transparent;
  }
  #panel.open { transform: translateX(0); }
  #panel::-webkit-scrollbar { width: 4px; }
  #panel::-webkit-scrollbar-thumb { background: #3a3028; border-radius: 2px; }

  #panel h2 {
    font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.15em;
    color: #c8b8a4; margin: 1.2rem 0 0.6rem; padding-bottom: 0.3rem;
    border-bottom: 1px solid rgba(200,180,160,0.1);
  }
  #panel h2:first-child { margin-top: 0; }

  .ctrl { display: flex; align-items: center; gap: 8px; margin: 0.4rem 0; }
  .ctrl label { flex: 0 0 90px; font-size: 10px; color: #8a7a6a; }
  .ctrl input[type="range"] {
    flex: 1; height: 3px; -webkit-appearance: none; appearance: none;
    background: #2a2420; border-radius: 2px; outline: none;
  }
  .ctrl input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 12px; height: 12px;
    background: #c8b8a4; border-radius: 50%; cursor: pointer;
  }
  .ctrl .val {
    flex: 0 0 36px; text-align: right; font-size: 10px;
    color: #6a5e52; font-variant-numeric: tabular-nums;
  }

  .toggle { display: flex; align-items: center; gap: 8px; margin: 0.35rem 0; }
  .toggle label { flex: 1; font-size: 10px; color: #8a7a6a; cursor: pointer; }
  .toggle input { display: none; }
  .toggle .sw {
    width: 28px; height: 14px; background: #2a2420;
    border-radius: 7px; position: relative; cursor: pointer;
    transition: background 0.2s;
  }
  .toggle .sw::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 10px; height: 10px; background: #5a5048;
    border-radius: 50%; transition: all 0.2s;
  }
  .toggle input:checked + .sw { background: #4a6a4a; }
  .toggle input:checked + .sw::after { left: 16px; background: #8ac88a; }

  /* Curve editor */
  #curveWrap {
    margin: 0.6rem 0; position: relative;
    background: #1a1714; border-radius: 4px; overflow: hidden;
  }
  #curveCanvas { display: block; cursor: crosshair; width: 100%; height: 180px; }

  .hint {
    text-align: center; font-size: 9px; color: #4a4038;
    margin-top: 0.5rem; letter-spacing: 0.1em;
  }

  .panel-btns {
    display: flex; gap: 8px; margin-top: 1rem; padding-top: 0.8rem;
    border-top: 1px solid #2a2420;
  }
  .panel-btns button {
    flex: 1; padding: 6px 0; border: none; border-radius: 4px;
    font-family: -apple-system, system-ui, sans-serif;
    font-size: 10px; letter-spacing: 0.1em; cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  #btnSave { background: #4a6a4a; color: #c8e8c8; }
  #btnSave:hover { background: #5a8a5a; }
  #btnSave.saved { background: #3a5a3a; color: #8ac88a; }
  #btnReset { background: #2a2420; color: #8a7a6a; }
  #btnReset:hover { background: #3a3028; color: #c8b8a4; }

  /* Progress preview bar */
  #progBar {
    margin: 0.8rem 0 0.3rem;
    height: 4px; background: #1a1714; border-radius: 2px; overflow: hidden;
  }
  #progFill { height: 100%; background: #c8b8a4; width: 0%; }

  /* Floating music toggle (top right, visible after scrolling) */
  #musicFloat {
    position: fixed; top: 1.2rem; right: 1.2rem;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300; font-size: 0.75rem;
    color: #8a7a6a; letter-spacing: 0.15em;
    background: rgba(10,9,8,0.6); border: 1px solid #5a4e42;
    padding: 0.5em 1.2em; cursor: pointer;
    backdrop-filter: blur(4px);
    z-index: 100; opacity: 0; pointer-events: none;
    transition: opacity 0.8s, color 0.3s, border-color 0.3s;
  }
  #musicFloat.visible { opacity: 0.85; pointer-events: auto; }
  #musicFloat:hover { opacity: 1; color: #d8cec2; border-color: #7a6e62; }
  #musicFloat.playing { color: #8ac88a; border-color: #5a7a5a; }
</style>
</head>
<body>

<div id="loader"><p>LADATAAN</p></div>
<canvas id="c"></canvas>
<div id="title">
  <h1>Lilli</h1>
  <p class="sub">&ldquo;akvarellit&rdquo;</p>
  <button id="musicBtn">musiikki p&auml;&auml;lle</button>
  <div id="scrollHint">
    <span>scrollaa</span>
    <span class="arrow">&darr;</span>
  </div>
</div>
<audio id="bgMusic" src="vivaldi-winter-largo.ogg" loop preload="auto"></audio>
<button id="musicFloat">musiikki p&auml;&auml;lle</button>

<!-- ===== SETTINGS PANEL ===== -->
<div id="panel">
  <h2>Scrollaus</h2>
  <div id="progBar"><div id="progFill"></div></div>
  <div class="ctrl"><label>Scroll-nopeus</label><input type="range" id="sSpeed" min="0.0001" max="0.002" step="0.0001" value="0.001"><span class="val"></span></div>
  <div class="ctrl"><label>Lerp (smooth)</label><input type="range" id="sLerp" min="0.01" max="0.25" step="0.005" value="0.06"><span class="val"></span></div>

  <h2>Transitio</h2>
  <div class="ctrl" style="margin-bottom:0.6rem">
    <label>Tyyli</label>
    <select id="sTransMode" style="flex:1;background:#1a1714;color:#c8b8a4;border:1px solid #2a2420;border-radius:3px;padding:3px 6px;font-size:10px;font-family:-apple-system,system-ui,sans-serif;cursor:pointer;">
      <option value="0">Radiaalinen</option>
      <option value="1">Akvarelli-bleed</option>
      <option value="2">Kuva-reveal</option>
    </select>
  </div>
  <div class="ctrl"><label>Reuna-feather</label><input type="range" id="sFeather" min="0.01" max="0.3" step="0.005" value="0.06"><span class="val"></span></div>
  <div class="ctrl"><label>Next-aloituskoko</label><input type="range" id="sNextScale" min="0.01" max="0.5" step="0.01" value="0.08"><span class="val"></span></div>

  <div id="radialControls">
    <div class="ctrl"><label>Noise-skaala</label><input type="range" id="sNoiseScale" min="0.5" max="12" step="0.1" value="3.5"><span class="val"></span></div>
    <div class="ctrl"><label>Noise-nopeus</label><input type="range" id="sNoiseSpeed" min="0" max="0.4" step="0.005" value="0.3"><span class="val"></span></div>
    <div class="ctrl"><label>Noise-määrä</label><input type="range" id="sNoiseAmp" min="0" max="0.4" step="0.005" value="0.1"><span class="val"></span></div>
    <div class="ctrl"><label>Radius-kerroin</label><input type="range" id="sRadius" min="0.8" max="2.0" step="0.05" value="1.3"><span class="val"></span></div>
  </div>

  <div id="watercolorControls" style="display:none">
    <div class="ctrl"><label>Warp-skaala</label><input type="range" id="sWarpScale" min="1" max="8" step="0.1" value="3"><span class="val"></span></div>
    <div class="ctrl"><label>Warp-voimakkuus</label><input type="range" id="sWarpIntensity" min="0.05" max="0.8" step="0.01" value="0.3"><span class="val"></span></div>
    <div class="ctrl"><label>Warp-nopeus</label><input type="range" id="sWarpSpeed" min="0" max="0.5" step="0.005" value="0.12"><span class="val"></span></div>
    <div class="ctrl"><label>Värivuoto</label><input type="range" id="sBleed" min="0" max="0.05" step="0.001" value="0.015"><span class="val"></span></div>
  </div>

  <div id="revealControls" style="display:none">
    <div class="ctrl"><label>Reveal-nopeus</label><input type="range" id="sRevealSpeed" min="0.2" max="1.0" step="0.01" value="0.55"><span class="val"></span></div>
    <div class="ctrl"><label>Kanavasplit</label><input type="range" id="sChannelSplit" min="0" max="1.0" step="0.01" value="0"><span class="val"></span></div>
    <div class="ctrl"><label>Reunahehku</label><input type="range" id="sEdgeGlow" min="0" max="1.5" step="0.02" value="0.5"><span class="val"></span></div>
    <div class="ctrl"><label>Pigmenttireuna</label><input type="range" id="sEdgeDarken" min="0" max="1.0" step="0.02" value="0.4"><span class="val"></span></div>
    <div class="ctrl"><label>Maski-zoom</label><input type="range" id="sRevealZoom" min="0" max="1.5" step="0.01" value="0.3"><span class="val"></span></div>
  </div>

  <div class="ctrl"><label>Black burn joka N:s</label><input type="range" id="sBlackBurnEvery" min="0" max="20" step="1" value="5"><span class="val"></span></div>

  <h2>Zoom & liike</h2>
  <div class="ctrl"><label>Zoom-teho</label><input type="range" id="sZoomPow" min="1.5" max="40" step="0.5" value="7"><span class="val"></span></div>
  <div class="ctrl"><label>Barrel</label><input type="range" id="sBarrel" min="0" max="1.0" step="0.01" value="0.15"><span class="val"></span></div>
  <div class="ctrl"><label>Parallaksi</label><input type="range" id="sParallax" min="0" max="0.06" step="0.002" value="0.015"><span class="val"></span></div>
  <div class="ctrl"><label>Zoom mouse</label><input type="range" id="sZoomMouse" min="0" max="0.4" step="0.005" value="0.06"><span class="val"></span></div>

  <h2>Post-efektit</h2>
  <div class="toggle"><label>Kromaattinen aberraatio</label><input type="checkbox" id="tAber" checked><span class="sw" onclick="this.previousElementSibling.click()"></span></div>
  <div class="ctrl"><label>Aber. määrä</label><input type="range" id="sAber" min="0" max="0.06" step="0.001" value="0.015"><span class="val"></span></div>

  <div class="toggle"><label>Vinjetti</label><input type="checkbox" id="tVig" checked><span class="sw" onclick="this.previousElementSibling.click()"></span></div>
  <div class="ctrl"><label>Vig. tummuus</label><input type="range" id="sVig" min="0" max="1" step="0.02" value="0.55"><span class="val"></span></div>

  <div class="toggle"><label>Filmirae</label><input type="checkbox" id="tGrain" checked><span class="sw" onclick="this.previousElementSibling.click()"></span></div>
  <div class="ctrl"><label>Rae-määrä</label><input type="range" id="sGrain" min="0" max="0.08" step="0.002" value="0.025"><span class="val"></span></div>

  <div class="toggle"><label>Mouse glow</label><input type="checkbox" id="tGlow" checked><span class="sw" onclick="this.previousElementSibling.click()"></span></div>
  <div class="ctrl"><label>Glow-määrä</label><input type="range" id="sGlow" min="0" max="1" step="0.02" value="0.25"><span class="val"></span></div>

  <div class="toggle"><label>Värigreidaus</label><input type="checkbox" id="tColor" checked><span class="sw" onclick="this.previousElementSibling.click()"></span></div>

  <h2>Transition Curve</h2>
  <div id="curveWrap"><canvas id="curveCanvas"></canvas></div>
  <p class="hint">Vedä pisteitä muokataksesi easingia · vedä vihreä piste (max) tai violetti piste (min) säätääksesi rajoja</p>
  <div class="toggle"><label>Keskipivotti</label><input type="checkbox" id="tMidEnabled" checked><span class="sw" onclick="this.previousElementSibling.click()"></span></div>
  <div class="toggle"><label>Peilikulmat</label><input type="checkbox" id="tMirrorHandles"><span class="sw" onclick="this.previousElementSibling.click()"></span></div>
  <div style="display:flex;gap:6px;margin-top:0.4rem;">
    <button id="btnResetCurve" style="flex:1;padding:4px 0;border:none;border-radius:3px;background:#2a2420;color:#8a7a6a;font-size:9px;letter-spacing:0.1em;cursor:pointer;font-family:-apple-system,system-ui,sans-serif;">RESET CURVE</button>
    <button id="btnLinearCurve" style="flex:1;padding:4px 0;border:none;border-radius:3px;background:#2a2420;color:#8a7a6a;font-size:9px;letter-spacing:0.1em;cursor:pointer;font-family:-apple-system,system-ui,sans-serif;">LINEAARINEN</button>
    <button id="btnLateMin" style="flex:1;padding:4px 0;border:none;border-radius:3px;background:#2a2420;color:#8a7a6a;font-size:9px;letter-spacing:0.1em;cursor:pointer;font-family:-apple-system,system-ui,sans-serif;">LATE MIN</button>
    <button id="btnEarlyMax" style="flex:1;padding:4px 0;border:none;border-radius:3px;background:#2a2420;color:#8a7a6a;font-size:9px;letter-spacing:0.1em;cursor:pointer;font-family:-apple-system,system-ui,sans-serif;">EARLY MAX</button>
  </div>

  <div class="panel-btns">
    <button id="btnSave">TALLENNA</button>
    <button id="btnReset">PALAUTA OLETUS</button>
  </div>
</div>

<!-- =================== SHADERS =================== -->
<script id="vs" type="x-shader/x-vertex">
attribute vec2 aPos;
varying vec2 vUv;
void main() {
  vUv = aPos * 0.5 + 0.5;
  gl_Position = vec4(aPos, 0.0, 1.0);
}
</script>

<script id="fs" type="x-shader/x-fragment">
precision highp float;

varying vec2 vUv;

uniform sampler2D uCurrent;
uniform sampler2D uNext;
uniform sampler2D uReveal;
uniform float uProgress;
uniform float uLinearProgress;
uniform vec2 uMouse;
uniform float uTime;
uniform vec2 uResolution;
uniform vec2 uCurrentSize;
uniform vec2 uNextSize;
uniform vec2 uRevealSize;

// Tweakable uniforms
uniform float uNoiseScale;
uniform float uNoiseSpeed;
uniform float uNoiseAmp;
uniform float uFeather;
uniform float uRadiusMult;
uniform float uNextStartScale;
uniform float uZoomPow;
uniform float uBarrelAmt;
uniform float uParallaxAmt;
uniform float uZoomMouse;
uniform float uAberAmt;     // 0 = off
uniform float uVigDark;     // 0 = off (value = darkest edge)
uniform float uGrainAmt;    // 0 = off
uniform float uGlowAmt;     // 0 = off
uniform float uColorGrade;  // 0 = off, 1 = on

// Watercolor transition
uniform float uTransitionMode; // 0 = radial, 1 = watercolor, 2 = image reveal
uniform float uWarpScale;
uniform float uWarpIntensity;
uniform float uWarpSpeed;
uniform float uBleedAmt;

// Image reveal
uniform float uRevealSpeed;    // pow exponent for reveal progress (< 1 = faster reveal)
uniform float uRevealZoom;     // how much the reveal mask zooms with scroll progress
uniform float uChannelSplit;   // 0 = pure luma, >0 = per-channel offset
uniform float uEdgeGlow;       // warm glow intensity at reveal boundary
uniform float uEdgeDarken;     // pigment pooling darkening at reveal boundary

// Scroll-based zoom drift & next image spawn offset
uniform vec2 uZoomDrift;
uniform vec2 uNextOffset;

// ---- Simplex noise ----
vec3 mod289(vec3 x) { return x - floor(x * (1.0/289.0)) * 289.0; }
vec2 mod289(vec2 x) { return x - floor(x * (1.0/289.0)) * 289.0; }
vec3 permute(vec3 x) { return mod289(((x*34.0)+1.0)*x); }

float snoise(vec2 v) {
  const vec4 C = vec4(0.211324865405187, 0.366025403784439,
                     -0.577350269189626, 0.024390243902439);
  vec2 i = floor(v + dot(v, C.yy));
  vec2 x0 = v - i + dot(i, C.xx);
  vec2 i1 = (x0.x > x0.y) ? vec2(1.0,0.0) : vec2(0.0,1.0);
  vec4 x12 = x0.xyxy + C.xxzz;
  x12.xy -= i1;
  i = mod289(i);
  vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0)) + i.x + vec3(0.0, i1.x, 1.0));
  vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
  m = m*m; m = m*m;
  vec3 x = 2.0 * fract(p * C.www) - 1.0;
  vec3 h = abs(x) - 0.5;
  vec3 a0 = x - floor(x + 0.5);
  m *= 1.79284291400159 - 0.85373472095314 * (a0*a0 + h*h);
  vec3 g;
  g.x = a0.x * x0.x + h.x * x0.y;
  g.yz = a0.yz * x12.xz + h.yz * x12.yw;
  return 130.0 * dot(m, g);
}

vec2 coverUv(vec2 uv, vec2 imgSize, vec2 screenSize) {
  uv.y = 1.0 - uv.y;
  float imgAspect = imgSize.x / imgSize.y;
  float screenAspect = screenSize.x / screenSize.y;
  vec2 scale = vec2(1.0);
  if (imgAspect > screenAspect) { scale.x = screenAspect / imgAspect; }
  else { scale.y = imgAspect / screenAspect; }
  return (uv - 0.5) * scale + 0.5;
}

vec2 barrel(vec2 uv, float amt) {
  vec2 cc = uv - 0.5;
  return uv + cc * dot(cc,cc) * amt;
}

void main() {
  vec2 uv = vUv;
  float p = clamp(uProgress, 0.0, 1.0);
  float lp = clamp(uLinearProgress, 0.0, 1.0);
  vec2 mOff = (uMouse - 0.5);
  vec2 parallax = mOff * uParallaxAmt;

  // ---- Current image: barrel (curved) + zoom (linear) ----
  float bAmt = -uBarrelAmt * p;
  vec2 curDistUv = barrel(uv, bAmt);
  float zoomFactor = 1.0 + (uZoomPow - 1.0) * lp;
  vec2 zoomCenter = vec2(0.5) + mOff * uZoomMouse * lp + uZoomDrift * lp;
  vec2 currentUv = (curDistUv - zoomCenter) / zoomFactor + zoomCenter;
  currentUv += parallax * (1.0 - p);

  // ---- Next image: spawn from offset, zoom (linear) ----
  float nextScale = uNextStartScale + lp * (1.0 - uNextStartScale);
  vec2 nextCenter = vec2(0.5) + uNextOffset * (1.0 - lp) * (1.0 - lp);
  vec2 nextUv = (uv - nextCenter) / nextScale + nextCenter;
  nextUv += parallax * p;

  vec2 cUv = coverUv(currentUv, uCurrentSize, uResolution);
  vec2 nUv = coverUv(nextUv, uNextSize, uResolution);

  // ---- Boundary ----
  vec2 fromCenter = uv - 0.5;
  float dist = length(fromCenter);
  float boundary;
  float boundaryR = -1.0;
  float boundaryB = -1.0;

  if (uTransitionMode < 0.5) {
    // === Radial noise mode (original) ===
    float n = snoise(fromCenter * uNoiseScale + uTime * uNoiseSpeed) * uNoiseAmp;
    n += snoise(fromCenter * uNoiseScale * 2.5 - uTime * uNoiseSpeed * 0.7) * uNoiseAmp * 0.5;
    float radius = p * uRadiusMult;
    float feath = uFeather + p * uFeather;
    boundary = smoothstep(radius - feath, radius + feath, dist + n);
  } else if (uTransitionMode < 1.5) {
    // === Watercolor bleed mode ===
    // Domain warping: noise(pos + noise(pos + noise(pos)))
    float t = uTime * uWarpSpeed;
    vec2 q = vec2(
      snoise(fromCenter * uWarpScale + vec2(0.0, t * 0.3)),
      snoise(fromCenter * uWarpScale + vec2(5.2, t * 0.2 + 1.3))
    );
    vec2 r = vec2(
      snoise((fromCenter + uWarpIntensity * q) * uWarpScale * 1.6 + vec2(1.7 - t * 0.15, 9.2)),
      snoise((fromCenter + uWarpIntensity * q) * uWarpScale * 1.6 + vec2(8.3, 2.8 + t * 0.12))
    );
    // Third octave for fine tendrils
    vec2 s = vec2(
      snoise((fromCenter + uWarpIntensity * r) * uWarpScale * 2.8 + vec2(3.1, t * 0.08)),
      snoise((fromCenter + uWarpIntensity * r) * uWarpScale * 2.8 + vec2(7.7, 4.2 - t * 0.1))
    );

    // Composite warped field: blend distance with warped noise
    float warpField = snoise(fromCenter * uWarpScale + uWarpIntensity * (q + r * 0.6 + s * 0.3));
    // Normalize roughly to 0..1
    warpField = warpField * 0.5 + 0.5;
    // Blend with radial distance so transition has directionality (center → out)
    float radialBias = dist * 1.4;
    warpField = mix(warpField, radialBias, 0.35);

    // Threshold based on progress
    float feath = uFeather + p * uFeather * 0.5;
    boundary = smoothstep(p - feath, p + feath, warpField);

    // Color bleed at boundary edges: shift the sampling slightly
    float bleedMask = smoothstep(p - feath * 2.0, p, warpField) - smoothstep(p, p + feath * 2.0, warpField);
    bleedMask = max(bleedMask, 0.0);
    vec2 bleedOffset = vec2(q.x, q.y) * uBleedAmt * bleedMask;
    currentUv += bleedOffset;
    nextUv -= bleedOffset * 0.5;
    // Recompute cover UVs with bleed
    cUv = coverUv(currentUv, uCurrentSize, uResolution);
    nUv = coverUv(nextUv, uNextSize, uResolution);
  } else {
    // === Image reveal mode ===
    // Remap progress so reveal runs ahead of other effects
    float rp = pow(p, uRevealSpeed);

    // Warp the reveal texture sampling UVs so the pattern breathes
    vec2 rUv = coverUv(uv, uRevealSize, uResolution);
    // Zoom the reveal mask with scroll progress
    if (uRevealZoom > 0.001) {
      float rZoom = 1.0 + uRevealZoom * rp;
      rUv = (rUv - 0.5) / rZoom + 0.5;
    }
    float t = uTime * uWarpSpeed;
    vec2 warpedRUv = rUv;
    if (uWarpIntensity > 0.001) {
      vec2 rCenter = rUv - 0.5;
      vec2 q = vec2(
        snoise(rCenter * uWarpScale + vec2(0.0, t * 0.3)),
        snoise(rCenter * uWarpScale + vec2(5.2, t * 0.2 + 1.3))
      );
      vec2 r = vec2(
        snoise((rCenter + uWarpIntensity * q) * uWarpScale * 1.6 + vec2(1.7 - t * 0.15, 9.2)),
        snoise((rCenter + uWarpIntensity * q) * uWarpScale * 1.6 + vec2(8.3, 2.8 + t * 0.12))
      );
      warpedRUv = rUv + uWarpIntensity * (q * 0.6 + r * 0.4) * 0.15;
    }
    vec3 revealRGB = texture2D(uReveal, clamp(warpedRUv, 0.0, 1.0)).rgb;
    float feath = uFeather + rp * uFeather * 0.5;

    float luma = dot(revealRGB, vec3(0.299, 0.587, 0.114));
    boundary = smoothstep(rp - feath, rp + feath, luma);
    // Fade out any remaining mask residue near the end of transition
    // so there's no hard snap when progress resets to 0
    float fadeOut = smoothstep(1.0, 0.92, rp);
    boundary *= fadeOut;

    // Channel split: offset reveal UV per channel for chromatic fringe at edge
    if (uChannelSplit > 0.001) {
      float edgeAmt = boundary * (1.0 - boundary) * 4.0; // only at transition edge
      vec2 splitOffset = edgeAmt * uChannelSplit * vec2(0.08, 0.04);
      float lumaR = dot(texture2D(uReveal, clamp(warpedRUv + splitOffset, 0.0, 1.0)).rgb, vec3(0.299, 0.587, 0.114));
      float lumaB = dot(texture2D(uReveal, clamp(warpedRUv - splitOffset, 0.0, 1.0)).rgb, vec3(0.299, 0.587, 0.114));
      boundaryR = smoothstep(rp - feath, rp + feath, lumaR);
      boundaryB = smoothstep(rp - feath, rp + feath, lumaB);
    }
  }

  // ---- Sample current ----
  float aberration = uAberAmt * p * (1.0 - p);
  vec2 aberDir = normalize(fromCenter + 0.001);

  vec2 cUvClamped = clamp(cUv, 0.0, 1.0);
  vec3 curCol;
  if (aberration > 0.0005) {
    curCol.r = texture2D(uCurrent, clamp(cUv + aberDir * aberration, 0.0, 1.0)).r;
    curCol.g = texture2D(uCurrent, cUvClamped).g;
    curCol.b = texture2D(uCurrent, clamp(cUv - aberDir * aberration, 0.0, 1.0)).b;
  } else {
    curCol = texture2D(uCurrent, cUvClamped).rgb;
  }

  // ---- Sample next (clamp to edge for smooth transition) ----
  vec3 nxtCol = texture2D(uNext, clamp(nUv, 0.0, 1.0)).rgb;

  // ---- Constrain boundary to next image coverage ----
  // Don't reveal next image where it hasn't scaled up yet
  float edgeDist = min(min(nUv.x, 1.0 - nUv.x), min(nUv.y, 1.0 - nUv.y));
  float nextCoverage = smoothstep(-0.03, 0.05, edgeDist);
  nextCoverage = max(nextCoverage, smoothstep(0.92, 0.99, p));

  // ---- Mix ----
  float maskedBoundary = mix(1.0, boundary, nextCoverage);
  vec3 col;
  if (boundaryR >= 0.0) {
    // Per-channel boundary for chromatic fringe
    float mR = mix(1.0, boundaryR, nextCoverage);
    float mG = maskedBoundary;
    float mB = mix(1.0, boundaryB, nextCoverage);
    col.r = mix(nxtCol.r, curCol.r, mR);
    col.g = mix(nxtCol.g, curCol.g, mG);
    col.b = mix(nxtCol.b, curCol.b, mB);
  } else {
    col = mix(nxtCol, curCol, maskedBoundary);
  }

  // ---- Watercolor edge bloom (pigment pooling + warm glow at reveal boundary) ----
  if (uTransitionMode > 1.5 && (uEdgeGlow > 0.001 || uEdgeDarken > 0.001)) {
    // Edge intensity: peaks right at the reveal boundary, fades on both sides
    float edge = maskedBoundary * (1.0 - maskedBoundary) * 4.0;
    // Sharper pigment line (narrow dark band like paint pooling at brush edge)
    float edgeSharp = pow(edge, 1.5);
    // Wider soft glow (warm light bleeding from the revealed area)
    float edgeWide = pow(edge, 0.6);

    // Pigment darkening: darken and slightly saturate at the boundary
    if (uEdgeDarken > 0.001) {
      float lum = dot(col, vec3(0.299, 0.587, 0.114));
      vec3 saturated = col / max(lum, 0.01) * lum; // push toward hue
      // Warm tint for the darkening (like watercolor pigment pooling)
      vec3 darkTint = col * vec3(0.7, 0.55, 0.4);
      col = mix(col, darkTint, edgeSharp * uEdgeDarken * 0.6);
      // Boost saturation at edge
      vec3 gray = vec3(lum);
      col = mix(gray, col, 1.0 + edgeSharp * uEdgeDarken * 0.4);
    }

    // Warm glow: soft luminance emanating from the reveal edge
    if (uEdgeGlow > 0.001) {
      vec3 warmLight = vec3(1.0, 0.92, 0.8); // warm paper-like glow
      col += warmLight * edgeWide * uEdgeGlow * 0.35;
    }
  }

  // ---- Mouse glow ----
  if (uGlowAmt > 0.0) {
    float md = length(uv - uMouse);
    col += exp(-md * md * 12.0) * p * (1.0 - p) * uGlowAmt;
  }

  // ---- Vignette ----
  if (uVigDark > 0.0) {
    float vig = 1.0 - dot(fromCenter * 1.1, fromCenter * 1.1);
    vig = smoothstep(0.0, 0.7, vig);
    col *= mix(1.0 - uVigDark, 1.0, vig);
  }

  // ---- Grain ----
  if (uGrainAmt > 0.0) {
    float grain = (snoise(uv * 500.0 + uTime * 10.0) * 0.5 + 0.5) * uGrainAmt;
    col += grain - uGrainAmt * 0.5;
  }

  // ---- Color grade ----
  if (uColorGrade > 0.5) {
    col = pow(col, vec3(0.95, 0.98, 1.02));
  }

  gl_FragColor = vec4(col, 1.0);
}

<script>
// ===== SETTINGS OBJECT =====
const DEFAULTS = {
  speed: 0.001, lerp: 0.06, noiseScale: 3.5, noiseSpeed: 0.3,
  noiseAmp: 0.1, feather: 0.16, radius: 1.3, nextScale: 0.01,
  transMode: 2,
  warpScale: 1.5, warpIntensity: 0.06, warpSpeed: 0.05, bleed: 0,
  revealSpeed: 0.55,
  revealZoom: 0.82,
  channelSplit: 0,
  edgeGlow: 0,
  edgeDarken: 0,
  blackBurnEvery: 0,
  zoomPow: 1.5, barrel: 0.56, parallax: 0.015, zoomMouse: 0.06,
  aber: 0.01, aberOn: true, vig: 0, vigOn: true,
  grain: 0.024, grainOn: true, glow: 0, glowOn: true, colorOn: true,
};
const CURVE_DEFAULTS = {
  x1: 0.33, y1: 0.33,      // handle for start
  mx: 0.5, my: 0.5,        // mid point (on curve)
  mhx: 0.33, mhy: 0.33,    // mid handle (left side; right side is mirrored)
  x2: 0.67, y2: 0.67,      // handle for end
  startX: 0.0,             // x where curve leaves min (0.0 = normal start)
  endX: 1.0,               // x where curve reaches max (1.0 = normal end)
  midEnabled: true,         // mid pivot point enabled
  mirrorHandles: false,     // mirror cp1 ↔ cp2
};

const STORAGE_KEY = 'lillinAkvarellit_settings';

function loadSavedSettings() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch { return null; }
}

// Load saved settings: localStorage overrides file-based defaults
const saved = loadSavedSettings();
const S = { ...DEFAULTS, ...(saved?.settings || {}) };

// ===== CURVE EDITOR =====
// Two-segment cubic bezier through a draggable mid point
// Seg1: (0,0) → (x1,y1) → (mhx,mhy) → (mx,my)
// Seg2: (mx,my) → (mirror of mh) → (x2,y2) → (1,1)
const curve = { ...CURVE_DEFAULTS, ...(saved?.curve || {}) };

// Try to load settings.json (git-tracked preset) as base layer
fetch('settings.json').then(r => r.ok ? r.json() : null).then(file => {
  if (!file) return;
  // File settings fill in where localStorage hasn't overridden
  const localKeys = saved?.settings ? Object.keys(saved.settings) : [];
  for (const [k, v] of Object.entries(file.settings || {})) {
    if (!localKeys.includes(k)) S[k] = v;
  }
  const localCurveKeys = saved?.curve ? Object.keys(saved.curve) : [];
  for (const [k, v] of Object.entries(file.curve || {})) {
    if (!localCurveKeys.includes(k)) curve[k] = v;
  }
}).catch(() => {});

function cubicB(t, p0, p1, p2, p3) {
  const mt = 1 - t;
  return mt*mt*mt*p0 + 3*mt*mt*t*p1 + 3*mt*t*t*p2 + t*t*t*p3;
}
function cubicBd(t, p0, p1, p2, p3) {
  const mt = 1 - t;
  return 3*mt*mt*(p1-p0) + 6*mt*t*(p2-p1) + 3*t*t*(p3-p2);
}
function solveT(x, xp0, xp1, xp2, xp3) {
  let t = 0.5;
  for (let i = 0; i < 12; i++) {
    const xAt = cubicB(t, xp0, xp1, xp2, xp3);
    const dx = cubicBd(t, xp0, xp1, xp2, xp3);
    if (Math.abs(dx) < 1e-7) break;
    t -= (xAt - x) / dx;
    t = Math.max(0, Math.min(1, t));
  }
  return t;
}

function applyCurve(x) {
  if (x <= 0) return 0;
  if (x >= 1) return 1;
  const sX = curve.startX || 0;
  const eX = curve.endX;
  // Before startX → still at min
  if (sX > 0 && x <= sX) return 0;
  // Past endX → already at max
  if (eX < 1 && x >= eX) return 1;
  // Remap x from startX..endX → 0..1 for curve evaluation
  const range = eX - sX;
  const rx = range < 0.99 ? (x - sX) / range : x;

  if (!curve.midEnabled) {
    // Single cubic segment: (0,0) → (x1,y1) → (x2,y2) → (1,1)
    const t = solveT(rx, 0, curve.x1, curve.x2, 1);
    return cubicB(t, 0, curve.y1, curve.y2, 1);
  }
  const mhxR = 2 * curve.mx - curve.mhx;
  const mhyR = 2 * curve.my - curve.mhy;
  if (rx <= curve.mx) {
    const t = solveT(rx, 0, curve.x1, curve.mhx, curve.mx);
    return cubicB(t, 0, curve.y1, curve.mhy, curve.my);
  } else {
    const t = solveT(rx, curve.mx, mhxR, curve.x2, 1);
    return cubicB(t, curve.my, mhyR, curve.y2, 1);
  }
}

// ===== CURVE CANVAS =====
function initCurveEditor() {
  const canvas = document.getElementById('curveCanvas');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  const W = rect.width;
  const H = 180;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const pad = 16;
  const gw = W - pad * 2;
  const gh = H - pad * 2;

  function toScreen(x, y) { return [pad + x * gw, pad + (1 - y) * gh]; }
  function fromScreen(sx, sy) { return [(sx - pad) / gw, 1 - (sy - pad) / gh]; }

  // Draggable: 'cp1', 'cp2', 'mid', 'mh'
  let dragging = null;

  function draw(curveProgress) {
    ctx.clearRect(0, 0, W, H);
    const mhxR = 2 * curve.mx - curve.mhx;
    const mhyR = 2 * curve.my - curve.mhy;
    const sX = curve.startX || 0;
    const eX = curve.endX;

    // Grid
    ctx.strokeStyle = '#1e1c1a';
    ctx.lineWidth = 1;
    for (let i = 0; i <= 4; i++) {
      const [x] = toScreen(i/4, 0);
      const [, y2] = toScreen(0, i/4);
      ctx.beginPath(); ctx.moveTo(x, pad); ctx.lineTo(x, pad + gh); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(pad, y2); ctx.lineTo(pad + gw, y2); ctx.stroke();
    }

    // Diagonal
    ctx.strokeStyle = '#2a2622';
    ctx.setLineDash([3, 3]);
    const [dx0, dy0] = toScreen(0, 0);
    const [dx1, dy1] = toScreen(1, 1);
    ctx.beginPath(); ctx.moveTo(dx0, dy0); ctx.lineTo(dx1, dy1); ctx.stroke();
    ctx.setLineDash([]);

    // startX marker line
    if (sX > 0.001) {
      ctx.strokeStyle = '#6a4a5a';
      ctx.setLineDash([4, 4]);
      const [sx2] = toScreen(sX, 0);
      ctx.beginPath(); ctx.moveTo(sx2, pad); ctx.lineTo(sx2, pad + gh); ctx.stroke();
      ctx.setLineDash([]);
      // Flat region before startX
      ctx.strokeStyle = 'rgba(106,74,90,0.4)';
      ctx.lineWidth = 2;
      const [fsx, fsy] = toScreen(0, 0);
      const [fex, fey] = toScreen(sX, 0);
      ctx.beginPath(); ctx.moveTo(fsx, fsy); ctx.lineTo(fex, fey); ctx.stroke();
    }

    // endX marker line
    if (eX < 0.999) {
      ctx.strokeStyle = '#5a6a4a';
      ctx.setLineDash([4, 4]);
      const [ex] = toScreen(eX, 0);
      ctx.beginPath(); ctx.moveTo(ex, pad); ctx.lineTo(ex, pad + gh); ctx.stroke();
      ctx.setLineDash([]);
      // Flat region after endX
      ctx.strokeStyle = 'rgba(90,106,74,0.4)';
      ctx.lineWidth = 2;
      const [fsx, fsy] = toScreen(eX, 1);
      const [fex, fey] = toScreen(1, 1);
      ctx.beginPath(); ctx.moveTo(fsx, fsy); ctx.lineTo(fex, fey); ctx.stroke();
    }

    // Draw curve
    const range = eX - sX;
    ctx.strokeStyle = '#c8b8a4';
    ctx.lineWidth = 2;
    ctx.beginPath();
    const [sx, sy] = toScreen(sX, 0);
    ctx.moveTo(sx, sy);

    if (!curve.midEnabled) {
      // Single segment: (sX,0) → cp1 → cp2 → (eX,1)
      for (let i = 1; i <= 80; i++) {
        const t = i / 80;
        const bx = cubicB(t, sX, sX + curve.x1 * range, sX + curve.x2 * range, eX);
        const by = cubicB(t, 0, curve.y1, curve.y2, 1);
        const [px, py] = toScreen(bx, by);
        ctx.lineTo(px, py);
      }
    } else {
      // Segment 1: (sX,0) → cp1 → mh → (mid)
      const mxS = sX + curve.mx * range;
      for (let i = 1; i <= 40; i++) {
        const t = i / 40;
        const bx = cubicB(t, sX, sX + curve.x1 * range, sX + curve.mhx * range, mxS);
        const by = cubicB(t, 0, curve.y1, curve.mhy, curve.my);
        const [px, py] = toScreen(bx, by);
        ctx.lineTo(px, py);
      }
      // Segment 2: (mid) → mhR → cp2 → (eX, 1)
      for (let i = 1; i <= 40; i++) {
        const t = i / 40;
        const bx = cubicB(t, mxS, sX + mhxR * range, sX + curve.x2 * range, eX);
        const by = cubicB(t, curve.my, mhyR, curve.y2, 1);
        const [px, py] = toScreen(bx, by);
        ctx.lineTo(px, py);
      }
    }
    ctx.stroke();

    // Control lines
    ctx.strokeStyle = 'rgba(200,180,160,0.25)';
    ctx.lineWidth = 1;
    const [c1x, c1y] = toScreen(sX + curve.x1 * range, curve.y1);
    const [c2x, c2y] = toScreen(sX + curve.x2 * range, curve.y2);
    ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(c1x, c1y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(...toScreen(eX, 1)); ctx.lineTo(c2x, c2y); ctx.stroke();

    const points = [
      { x: c1x, y: c1y, id: 'cp1', r: 5, col: '#c8b8a4' },
      { x: c2x, y: c2y, id: 'cp2', r: 5, col: '#c8b8a4' },
    ];

    if (curve.midEnabled) {
      const mxS = sX + curve.mx * range;
      const [msx, msy] = toScreen(mxS, curve.my);
      const [mhsx, mhsy] = toScreen(sX + curve.mhx * range, curve.mhy);
      const [mhrx, mhry] = toScreen(sX + mhxR * range, mhyR);
      // Mid handle lines
      ctx.beginPath(); ctx.moveTo(mhsx, mhsy); ctx.lineTo(msx, msy); ctx.lineTo(mhrx, mhry); ctx.stroke();
      points.push(
        { x: mhsx, y: mhsy, id: 'mh', r: 4, col: '#8a9aaa' },
        { x: mhrx, y: mhry, id: 'mh_mirror', r: 3, col: '#5a6a7a' },
        { x: msx, y: msy, id: 'mid', r: 6, col: '#e8c888' },
      );
    }

    // startX handle
    if (sX > 0.001) {
      const [ssx, ssy] = toScreen(sX, 0);
      points.push({ x: ssx, y: ssy, id: 'startX', r: 5, col: '#6a4a5a' });
    }

    // endX handle
    if (eX < 0.999) {
      const [esx, esy] = toScreen(eX, 1);
      points.push({ x: esx, y: esy, id: 'endX', r: 5, col: '#5a6a4a' });
    }

    for (const pt of points) {
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, pt.r, 0, Math.PI * 2);
      ctx.fillStyle = (dragging === pt.id) ? '#fff' : pt.col;
      ctx.fill();
    }

    // Progress indicator
    if (curveProgress !== undefined && curveProgress > 0.001 && curveProgress < 0.999) {
      const cy = applyCurve(curveProgress);
      const [ix, iy] = toScreen(curveProgress, cy);
      ctx.beginPath();
      ctx.arc(ix, iy, 4, 0, Math.PI * 2);
      ctx.fillStyle = '#ff9060';
      ctx.fill();
    }
  }

  function hitTest(sx, sy) {
    const mhxR = 2 * curve.mx - curve.mhx;
    const mhyR = 2 * curve.my - curve.mhy;
    const sX = curve.startX || 0;
    const eX = curve.endX;
    const range = eX - sX;
    const pts = [
      { s: toScreen(sX + curve.x1 * range, curve.y1), id: 'cp1' },
      { s: toScreen(sX + curve.x2 * range, curve.y2), id: 'cp2' },
    ];
    if (curve.midEnabled) {
      pts.unshift(
        { s: toScreen(sX + curve.mx * range, curve.my), id: 'mid' },
        { s: toScreen(sX + curve.mhx * range, curve.mhy), id: 'mh' },
      );
    }
    if (sX > 0.001) {
      pts.push({ s: toScreen(sX, 0), id: 'startX' });
    }
    if (eX < 0.999) {
      pts.push({ s: toScreen(eX, 1), id: 'endX' });
    }
    for (const p of pts) {
      if (Math.hypot(sx - p.s[0], sy - p.s[1]) < 14) return p.id;
    }
    return null;
  }

  canvas.addEventListener('mousedown', (e) => {
    const r = canvas.getBoundingClientRect();
    dragging = hitTest(e.clientX - r.left, e.clientY - r.top);
  });

  window.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const r = canvas.getBoundingClientRect();
    const [nx, ny] = fromScreen(e.clientX - r.left, e.clientY - r.top);
    const cx = Math.max(0, Math.min(1, nx));
    const cy = Math.max(0, Math.min(1, ny));
    const sX = curve.startX || 0;
    const eX = curve.endX;
    const range = eX - sX;
    // Convert screen x to normalized curve x (0..1 within the startX..endX range)
    const ncx = range > 0.01 ? Math.max(0, Math.min(1, (cx - sX) / range)) : cx;

      curve.x1 = curve.midEnabled ? Math.min(ncx, curve.mx) : Math.min(ncx, 1);

    }
    else if (dragging === 'cp2') {
      curve.x2 = curve.midEnabled ? Math.max(ncx, curve.mx) : Math.max(ncx, 0);
      curve.y2 = cy;
      if (curve.mirrorHandles) { curve.x1 = 1 - curve.x2; curve.y1 = 1 - curve.y2; }
    }
    else if (dragging === 'mid' && curve.midEnabled) {
      const dx = ncx - curve.mx, dy = cy - curve.my;
      curve.mx = Math.max(0.05, Math.min(0.95, ncx));
      curve.my = Math.max(0, Math.min(1, cy));
      curve.mhx = Math.max(0, Math.min(1, curve.mhx + dx));
      curve.mhy = Math.max(0, Math.min(1, curve.mhy + dy));
    }
    else if (dragging === 'mh' && curve.midEnabled) {
      curve.mhx = Math.max(0, Math.min(curve.mx, ncx));
      curve.mhy = cy;
    }
    else if (dragging === 'startX') {
      curve.startX = Math.max(0, Math.min(eX - 0.15, cx));
    }
    else if (dragging === 'endX') {
      curve.endX = Math.max(sX + 0.15, Math.min(1, cx));
    }
  });

  window.addEventListener('mouseup', () => { dragging = null; });

  // Reset curve button
  document.getElementById('btnResetCurve').addEventListener('click', () => {
    Object.assign(curve, CURVE_DEFAULTS);
    tMidEl.checked = curve.midEnabled;
    tMirrorEl.checked = curve.mirrorHandles;
  });

  // Linear curve button
  document.getElementById('btnLinearCurve').addEventListener('click', () => {
    Object.assign(curve, {
      x1: 0.33, y1: 0.33,
      mx: 0.5, my: 0.5,
      mhx: 0.33, mhy: 0.33,
      x2: 0.67, y2: 0.67,
      startX: 0.0,
      endX: 1.0,
    });
  });

  // Late min button – sets startX to 0.3 so curve stays at 0 longer
  document.getElementById('btnLateMin').addEventListener('click', () => {
    curve.startX = 0.3;
  });

  // Early max button – sets endX to 0.7 so curve reaches max earlier
  document.getElementById('btnEarlyMax').addEventListener('click', () => {
    curve.endX = 0.7;
  });

  // Mid pivot toggle
  const tMidEl = document.getElementById('tMidEnabled');
  tMidEl.checked = curve.midEnabled;
  tMidEl.addEventListener('change', () => { curve.midEnabled = tMidEl.checked; });

  // Mirror handles toggle
  const tMirrorEl = document.getElementById('tMirrorHandles');
  tMirrorEl.checked = curve.mirrorHandles;
  tMirrorEl.addEventListener('change', () => { curve.mirrorHandles = tMirrorEl.checked; });

  return draw;
}

// ===== BIND SLIDERS =====
function bindSliders() {
  const map = {
    sSpeed: 'speed', sLerp: 'lerp', sNoiseScale: 'noiseScale',
    sNoiseSpeed: 'noiseSpeed', sNoiseAmp: 'noiseAmp', sFeather: 'feather',
    sRadius: 'radius', sNextScale: 'nextScale',
    sWarpScale: 'warpScale', sWarpIntensity: 'warpIntensity',
    sWarpSpeed: 'warpSpeed', sBleed: 'bleed',
    sRevealSpeed: 'revealSpeed',
    sRevealZoom: 'revealZoom',
    sChannelSplit: 'channelSplit',
    sEdgeGlow: 'edgeGlow',
    sEdgeDarken: 'edgeDarken',
    sBlackBurnEvery: 'blackBurnEvery',
    sZoomPow: 'zoomPow',
    sBarrel: 'barrel', sParallax: 'parallax', sZoomMouse: 'zoomMouse',
    sAber: 'aber', sVig: 'vig', sGrain: 'grain', sGlow: 'glow',
  };

  // Transition mode selector
  const modeSelect = document.getElementById('sTransMode');
  const radialDiv = document.getElementById('radialControls');
  const waterDiv = document.getElementById('watercolorControls');
  const revealDiv = document.getElementById('revealControls');
  modeSelect.value = S.transMode;
  function updateModeUI() {
    radialDiv.style.display = S.transMode === 0 ? '' : 'none';
    waterDiv.style.display = (S.transMode === 1 || S.transMode === 2) ? '' : 'none';
    revealDiv.style.display = S.transMode === 2 ? '' : 'none';
  }
  updateModeUI();
  modeSelect.addEventListener('change', () => {
    S.transMode = parseInt(modeSelect.value);
    updateModeUI();
  });
  const toggleMap = {
    tAber: 'aberOn', tVig: 'vigOn', tGrain: 'grainOn', tGlow: 'glowOn', tColor: 'colorOn',
  };

  for (const [id, key] of Object.entries(map)) {
    const el = document.getElementById(id);
    const valEl = el.parentElement.querySelector('.val');
    el.value = S[key];
    valEl.textContent = Number(S[key]).toFixed(3);
    el.addEventListener('input', () => {
      S[key] = parseFloat(el.value);
      valEl.textContent = Number(S[key]).toFixed(3);
    });
  }
  for (const [id, key] of Object.entries(toggleMap)) {
    const el = document.getElementById(id);
    el.checked = S[key];
    el.addEventListener('change', () => { S[key] = el.checked; });
  }

  // Save button – saves to localStorage AND downloads settings.json for git
  document.getElementById('btnSave').addEventListener('click', () => {
    const data = { settings: { ...S }, curve: { ...curve } };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    // Download settings.json so it can be committed to git
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'settings.json';
    a.click();
    URL.revokeObjectURL(a.href);
    const btn = document.getElementById('btnSave');
    btn.textContent = 'TALLENNETTU ✓';
    btn.classList.add('saved');
    setTimeout(() => { btn.textContent = 'TALLENNA'; btn.classList.remove('saved'); }, 1500);
  });

  // Reset button
  document.getElementById('btnReset').addEventListener('click', () => {
    localStorage.removeItem(STORAGE_KEY);
    Object.assign(S, DEFAULTS);
    Object.assign(curve, CURVE_DEFAULTS);
    // Update all sliders and toggles
    for (const [id, key] of Object.entries(map)) {
      const el = document.getElementById(id);
      const valEl = el.parentElement.querySelector('.val');
      el.value = S[key];
      valEl.textContent = Number(S[key]).toFixed(3);
    }
    for (const [id, key] of Object.entries(toggleMap)) {
      document.getElementById(id).checked = S[key];
    }
    document.getElementById('sTransMode').value = S.transMode;
    updateModeUI();
  });
}

// ===== MAIN =====
function shuffle(arr, seed) {
  let s = seed; const a = [...arr];
  const rng = () => { s=(s*1103515245+12345)&0x7fffffff; return s/0x7fffffff; };
  for (let i=a.length-1;i>0;i--) { const j=Math.floor(rng()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

async function init() {
  const catalog = await (await fetch('catalog.json')).json();
  const paintings = shuffle(catalog, 42);
  const total = paintings.length;

  const canvas = document.getElementById('c');
  const gl = canvas.getContext('webgl', { antialias: false, alpha: false });
  if (!gl) { alert('WebGL ei tuettu'); return; }

  let panelOpen = false;

  function resize() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    gl.viewport(0, 0, canvas.width, canvas.height);
  }
  resize();
  window.addEventListener('resize', resize);

  function compileShader(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) { console.error(gl.getShaderInfoLog(s)); return null; }
    return s;
  }

  const vs = compileShader(gl.VERTEX_SHADER, document.getElementById('vs').textContent);
  const fs = compileShader(gl.FRAGMENT_SHADER, document.getElementById('fs').textContent);
  const prog = gl.createProgram();
  gl.attachShader(prog, vs); gl.attachShader(prog, fs);
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) { console.error(gl.getProgramInfoLog(prog)); return; }
  gl.useProgram(prog);

  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const aPos = gl.getAttribLocation(prog, 'aPos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  // All uniform locations
  const U = {};
  ['uCurrent','uNext','uReveal','uProgress','uMouse','uTime','uResolution','uCurrentSize','uNextSize','uRevealSize',
   'uNoiseScale','uNoiseSpeed','uNoiseAmp','uFeather','uRadiusMult','uNextStartScale',
   'uTransitionMode','uWarpScale','uWarpIntensity','uWarpSpeed','uBleedAmt',
   'uRevealSpeed','uRevealZoom','uChannelSplit','uEdgeGlow','uEdgeDarken',
   'uZoomPow','uBarrelAmt','uParallaxAmt','uZoomMouse',
   'uAberAmt','uVigDark','uGrainAmt','uGlowAmt','uColorGrade',
   'uZoomDrift','uNextOffset','uLinearProgress'
  ].forEach(name => { U[name] = gl.getUniformLocation(prog, name); });

  // Texture loading
  const texCache = {};
  // Queue of decoded images waiting to be uploaded to GPU (one per frame to avoid stalls)
  const pendingUploads = [];

  // Black burn placeholder texture (1x1 near-black pixel)
  const blackTex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, blackTex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE, new Uint8Array([10,9,8,255]));
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  const blackEntry = { tex: blackTex, width: 1, height: 1, ready: true };

  function loadTexture(idx) {
    const i = ((idx % total) + total) % total;
    if (texCache[i]) return texCache[i];
    const tex = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE, new Uint8Array([10,9,8,255]));
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
    const entry = { tex, width: 1, height: 1, ready: false };
    texCache[i] = entry;
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.src = `akvarellit/web/${paintings[i].filename}`;
    // decode() offloads image decoding off the main thread, avoiding GPU stalls
    img.decode().then(() => {
      pendingUploads.push({ entry, tex, img });
    }).catch(() => {
      // Fallback for browsers without decode support
      pendingUploads.push({ entry, tex, img });
    });
    return entry;
  }

  // Upload at most N pending textures per frame to spread GPU cost
  function processPendingUploads(maxPerFrame) {
    const count = Math.min(pendingUploads.length, maxPerFrame);
    for (let i = 0; i < count; i++) {
      const { entry, tex, img } = pendingUploads.shift();
      uploadTexEntry(entry, tex, img);
    }
  }
  function uploadTexEntry(entry, tex, img) {
    if (entry.ready) return;
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
    entry.width = img.naturalWidth; entry.height = img.naturalHeight; entry.ready = true;
  }
  // Force-upload a specific texture if it's pending (skip the queue)
  function ensureUploaded(texEntry) {
    if (texEntry.ready) return;
    for (let i = 0; i < pendingUploads.length; i++) {
      if (pendingUploads[i].entry === texEntry) {
        const { entry, tex, img } = pendingUploads.splice(i, 1)[0];
        uploadTexEntry(entry, tex, img);
        return;
      }
    }
  }

  // Pick a reveal texture index for each transition pair
  // Use a shuffled offset so each transition gets a unique painting
  function pickRevealIndex(ci, ni) {
    // Pick an image that's neither current nor next
    let ri = (ci + 3) % total;
    if (ri === ci || ri === ni) ri = (ri + 1) % total;
    if (ri === ci || ri === ni) ri = (ri + 1) % total;
    return ri;
  }

  [0,1,2,3].forEach(i => loadTexture(i));
  await new Promise(resolve => {
    const check = () => {
      // Process all pending uploads during loading (no frame budget needed yet)
      processPendingUploads(pendingUploads.length);
      if (texCache[0]?.ready && texCache[1]?.ready) resolve();
      else setTimeout(check, 50);
    }; check();
  });
  document.getElementById('loader').classList.add('gone');

  // Init UI
  bindSliders();
  const drawCurve = initCurveEditor();

  // Panel toggle
  const panel = document.getElementById('panel');
  window.addEventListener('keydown', (e) => {
    if (e.key === 's' || e.key === 'S') {
      if (e.metaKey || e.ctrlKey) return; // don't hijack save
      panelOpen = !panelOpen;
      panel.classList.toggle('open', panelOpen);
      document.body.classList.toggle('panel-open', panelOpen);
      e.preventDefault();
    }
  });

  // Per-image deterministic offsets (golden angle distribution)
  function getSpawnOffset(index) {
    const angle = index * 2.399963; // golden angle
    const isPortrait = window.innerHeight > window.innerWidth;
    const maxR = isPortrait ? 0.12 : 0.22;
    const r = maxR * (0.6 + 0.4 * Math.abs(Math.sin(index * 1.7)));
    return [Math.cos(angle) * r, Math.sin(angle) * r];
  }
  function getZoomDrift(index) {
    const angle = index * 3.883222 + 1.2; // different sequence
    const r = 0.04 + 0.02 * Math.abs(Math.cos(index * 2.3));
    return [Math.cos(angle) * r, Math.sin(angle) * r];
  }

  // State
  let currentIndex = 0;
  let progress = 0, targetProgress = 0;
  let mouseX = 0.5, mouseY = 0.5;
  let smoothMouseX = 0.5, smoothMouseY = 0.5;
  let titleHidden = false;
  const titleEl = document.getElementById('title');
  const progFill = document.getElementById('progFill');

  // Music
  const bgMusic = document.getElementById('bgMusic');
  bgMusic.volume = 0.4;
  const musicBtn = document.getElementById('musicBtn');
  const musicFloat = document.getElementById('musicFloat');
  function toggleMusic() {
    if (bgMusic.paused) {
      bgMusic.play().catch(() => {});
      musicBtn.textContent = 'musiikki pois';
      musicBtn.classList.add('playing');
      musicFloat.textContent = 'musiikki pois';
      musicFloat.classList.add('playing');
    } else {
      bgMusic.pause();
      musicBtn.textContent = 'musiikki päälle';
      musicBtn.classList.remove('playing');
      musicFloat.textContent = 'musiikki päälle';
      musicFloat.classList.remove('playing');
    }
  }
  musicBtn.addEventListener('click', toggleMusic);
  musicFloat.addEventListener('click', toggleMusic);

  // Input
  window.addEventListener('wheel', (e) => {
    if (panelOpen && e.target.closest('#panel')) return; // allow panel scroll
    e.preventDefault();
    // Normalize deltaY across browsers/devices (line vs pixel vs page mode)
    let dy = e.deltaY;
    if (e.deltaMode === 1) dy *= 40;      // DOM_DELTA_LINE → pixels
    else if (e.deltaMode === 2) dy *= 800; // DOM_DELTA_PAGE → pixels
    targetProgress += dy * S.speed;
    if (currentIndex === 0 && targetProgress < 0) targetProgress = 0;
    if (currentIndex >= total - 2 && targetProgress > 1) targetProgress = 1;
  }, { passive: false });

  let touchY = 0;
  window.addEventListener('touchstart', (e) => { touchY = e.touches[0].clientY; }, { passive: true });
  window.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const dy = touchY - e.touches[0].clientY; touchY = e.touches[0].clientY;
    targetProgress += dy * S.speed * 4;
    if (currentIndex === 0 && targetProgress < 0) targetProgress = 0;
    if (currentIndex >= total - 2 && targetProgress > 1) targetProgress = 1;
  }, { passive: false });

  window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowDown' || e.key === 'ArrowRight' || e.key === ' ') {
      targetProgress += 0.12; e.preventDefault();
    }
    if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
      targetProgress -= 0.12; e.preventDefault();
    }
    if (currentIndex === 0 && targetProgress < 0) targetProgress = 0;
  });

  window.addEventListener('mousemove', (e) => {
    mouseX = e.clientX / window.innerWidth;
    mouseY = 1.0 - e.clientY / window.innerHeight;
  });

  // Render
  const startTime = performance.now();
  let lastFrame = performance.now();

  let prevProgWidth = '';

  function render(now) {
    requestAnimationFrame(render);

    // Upload pending textures (max 1 per frame to avoid GPU stalls)
    processPendingUploads(2);

    // Frame-rate independent lerp
    const dt = Math.min((now - lastFrame) / 1000, 0.05); // cap at 50ms to avoid jumps after tab switch
    lastFrame = now;
    const lerpFactor = 1 - Math.pow(1 - S.lerp, dt * 60); // normalize to 60fps baseline

    progress += (targetProgress - progress) * lerpFactor;
    if (Math.abs(targetProgress - progress) < 0.00001) progress = targetProgress;

    const mouseLerp = 1 - Math.pow(0.95, dt * 60);
    smoothMouseX += (mouseX - smoothMouseX) * mouseLerp;
    smoothMouseY += (mouseY - smoothMouseY) * mouseLerp;

    // Proactive preloading: keep textures loaded ahead of scroll position
    loadTexture(currentIndex + 2); loadTexture(currentIndex + 3); loadTexture(currentIndex + 4);
    // Also preload reveal textures for current and next transitions
    const preCI = ((currentIndex % total) + total) % total;
    const preNI = (((currentIndex + 1) % total) + total) % total;
    loadTexture(pickRevealIndex(preCI, preNI));
    const preNI2 = (((currentIndex + 2) % total) + total) % total;
    loadTexture(pickRevealIndex(preNI, preNI2));

    if (progress >= 1.0 && targetProgress >= 1.0 && currentIndex < total - 2) {
      currentIndex++; progress -= 1.0; targetProgress -= 1.0;
    } else if (progress <= 0.0 && targetProgress <= 0.0 && currentIndex > 0) {
      currentIndex--; progress += 1.0; targetProgress += 1.0;
    }
    progress = Math.max(0, Math.min(1, progress));

    // Apply curve
    const curvedP = applyCurve(progress);

    if (currentIndex === 0 && progress <= 0.03) {
      if (titleHidden) { titleEl.classList.add('shown'); titleEl.classList.remove('hidden'); titleHidden = false; musicFloat.classList.remove('visible'); }
    } else if (!titleHidden) {
      titleEl.classList.add('hidden'); titleHidden = true; musicFloat.classList.add('visible');
    }

    const ci = ((currentIndex % total) + total) % total;
    const ni = (((currentIndex + 1) % total) + total) % total;
    const curTex = texCache[ci] || loadTexture(ci);
    ensureUploaded(curTex);

    // Black burn: every N-th transition uses black placeholder as next image
    const burnN = Math.round(S.blackBurnEvery);
    const isBlackBurn = burnN > 0 && (currentIndex + 1) % burnN === 0;
    let nxtTex;
    if (isBlackBurn) {
      nxtTex = blackEntry;
    } else {
      const nxtTexRaw = texCache[ni] || loadTexture(ni);
      ensureUploaded(nxtTexRaw);
      nxtTex = nxtTexRaw.ready ? nxtTexRaw : curTex;
    }

    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, curTex.tex);
    gl.uniform1i(U.uCurrent, 0);
    gl.activeTexture(gl.TEXTURE1);
    gl.bindTexture(gl.TEXTURE_2D, nxtTex.tex);
    gl.uniform1i(U.uNext, 1);

    // Reveal texture (third painting for image-reveal mode)
    const ri = pickRevealIndex(ci, ni);
    let revTex = texCache[ri] || loadTexture(ri);
    ensureUploaded(revTex);
    // Fallback: if reveal texture not ready yet, use current image as mask
    // (prevents next image appearing unmasked while reveal loads)
    if (!revTex.ready) revTex = curTex;
    gl.activeTexture(gl.TEXTURE2);
    gl.bindTexture(gl.TEXTURE_2D, revTex.tex);
    gl.uniform1i(U.uReveal, 2);
    gl.uniform2f(U.uRevealSize, revTex.width, revTex.height);

    gl.uniform1f(U.uProgress, curvedP);
    gl.uniform1f(U.uLinearProgress, progress);
    gl.uniform2f(U.uMouse, smoothMouseX, smoothMouseY);
    gl.uniform1f(U.uTime, (performance.now() - startTime) * 0.001);
    gl.uniform2f(U.uResolution, canvas.width, canvas.height);
    gl.uniform2f(U.uCurrentSize, curTex.width, curTex.height);
    gl.uniform2f(U.uNextSize, nxtTex.width, nxtTex.height);

    // Tweakable uniforms
    gl.uniform1f(U.uNoiseScale, S.noiseScale);
    gl.uniform1f(U.uNoiseSpeed, S.noiseSpeed);
    gl.uniform1f(U.uNoiseAmp, S.noiseAmp);
    gl.uniform1f(U.uFeather, S.feather);
    gl.uniform1f(U.uRadiusMult, S.radius);
    gl.uniform1f(U.uNextStartScale, S.nextScale);
    gl.uniform1f(U.uTransitionMode, S.transMode);
    gl.uniform1f(U.uWarpScale, S.warpScale);
    gl.uniform1f(U.uWarpIntensity, S.warpIntensity);
    gl.uniform1f(U.uWarpSpeed, S.warpSpeed);
    gl.uniform1f(U.uBleedAmt, S.bleed);
    gl.uniform1f(U.uRevealSpeed, S.revealSpeed);
    gl.uniform1f(U.uRevealZoom, S.revealZoom);
    gl.uniform1f(U.uChannelSplit, S.channelSplit);
    gl.uniform1f(U.uEdgeGlow, S.edgeGlow);
    gl.uniform1f(U.uEdgeDarken, S.edgeDarken);
    gl.uniform1f(U.uZoomPow, S.zoomPow);
    gl.uniform1f(U.uBarrelAmt, S.barrel);
    gl.uniform1f(U.uParallaxAmt, S.parallax);
    gl.uniform1f(U.uZoomMouse, S.zoomMouse);
    gl.uniform1f(U.uAberAmt, S.aberOn ? S.aber : 0.0);
    gl.uniform1f(U.uVigDark, S.vigOn ? S.vig : 0.0);
    gl.uniform1f(U.uGrainAmt, S.grainOn ? S.grain : 0.0);
    gl.uniform1f(U.uGlowAmt, S.glowOn ? S.glow : 0.0);
    gl.uniform1f(U.uColorGrade, S.colorOn ? 1.0 : 0.0);

    // Per-image zoom drift and spawn offset
    const drift = getZoomDrift(ci);
    gl.uniform2f(U.uZoomDrift, drift[0], drift[1]);
    const spawn = getSpawnOffset(ni);
    gl.uniform2f(U.uNextOffset, spawn[0], spawn[1]);

    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

    // UI updates (only write DOM when values change)
    const progWidth = (progress * 100).toFixed(1) + '%';
    if (progWidth !== prevProgWidth) { progFill.style.width = progWidth; prevProgWidth = progWidth; }
    if (panelOpen) drawCurve(progress);
  }

  requestAnimationFrame(render);
}

init();
</script>
