<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lillin Akvarellit</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Georgia', serif;
            background: #d8d0c8;
            padding: 1.5rem;
        }
        h1 { text-align: center; color: #4a3728; font-size: 2rem; margin-bottom: 0.25rem; }
        .subtitle { text-align: center; color: #7a6558; margin-bottom: 1rem; font-size: 0.9rem; }

        .save-bar {
            max-width: 960px;
            margin: 0 auto 1.5rem;
            display: flex;
            gap: 0.75rem;
            align-items: center;
            justify-content: center;
        }
        .save-bar button {
            padding: 0.5rem 1.2rem;
            border: none;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
            background: #4a3728;
            color: white;
        }
        .save-bar button:hover { background: #5d4a3a; }
        .save-bar .status { font-size: 0.8rem; color: #7a6558; }

        .undo-bar {
            max-width: 960px;
            margin: 0 auto 1rem;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: #f5e6d0;
            border: 1px solid #d4c0a8;
            border-radius: 6px;
            font-size: 0.85rem;
            color: #4a3728;
        }
        .undo-bar.visible { display: flex; }
        .undo-bar button {
            padding: 0.35rem 0.9rem;
            border: none;
            border-radius: 5px;
            font-family: inherit;
            font-size: 0.8rem;
            cursor: pointer;
            background: #7a6558;
            color: white;
        }
        .undo-bar button:hover { background: #5d4a3a; }

        .swap-bar {
            max-width: 960px;
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: #4a3728;
        }
        .swap-bar label { font-weight: bold; }
        .swap-bar input[type="text"] {
            width: 60px;
            padding: 0.35rem 0.5rem;
            border: 1px solid #c0b0a0;
            border-radius: 5px;
            font-family: inherit;
            font-size: 0.85rem;
            text-align: center;
            background: white;
        }
        .swap-bar button {
            padding: 0.35rem 0.9rem;
            border: none;
            border-radius: 5px;
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
            background: #4a3728;
            color: white;
        }
        .swap-bar button:hover { background: #5d4a3a; }
        .swap-bar .swap-status {
            font-size: 0.75rem;
            color: #a05050;
            min-width: 120px;
        }

        /* Single A4 page (cover / back cover) */
        .a4 {
            position: relative;
            aspect-ratio: 210 / 297;
            background: white;
            box-shadow: 0 2px 16px rgba(0,0,0,0.12);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0.842% 1.190%; /* 2.5mm */
        }
        .a4 img {
            max-width: 100%;
            max-height: 100%;
            display: block;
            object-fit: contain;
        }

        /* Cover: single centered page */
        .cover-wrap {
            max-width: 480px;
            margin: 0 auto 1.5rem;
        }

        /* Spread: two A4 pages side by side */
        .spread {
            max-width: 960px;
            margin: 0 auto 1.5rem;
            display: flex;
            gap: 0;
            box-shadow: 0 2px 16px rgba(0,0,0,0.12);
        }
        .spread .a4 {
            flex: 1;
            box-shadow: none;
        }
        .spread .a4.left { border-right: 1px solid #e0d8d0; }

        /* Multi images (2 or 3 stacked on one A4 page) */
        .a4.multi {
            gap: 0.842%; /* 2.5mm */
        }
        .a4.multi .img-slot {
            flex: 1;
            min-height: 0;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .a4.multi .img-slot img {
            max-width: 100%;
            max-height: 100%;
            display: block;
            object-fit: contain;
        }

        .layout-select {
            position: absolute;
            top: 3px;
            left: 3px;
            z-index: 6;
            font-size: 0.65rem;
            padding: 2px 4px;
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 3px;
            background: rgba(0,0,0,0.6);
            color: white;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.15s;
        }
        .a4:hover .layout-select { opacity: 1; }

        /* Overlay & controls */
        .overlay {
            position: absolute;
            top: 3px;
            right: 3px;
            display: flex;
            align-items: center;
            gap: 4px;
            opacity: 0;
            transition: opacity 0.15s;
            z-index: 5;
        }
        .a4:hover .overlay,
        .img-slot:hover .overlay { opacity: 1; }

        .id-tag {
            position: absolute;
            bottom: 3px;
            left: 4px;
            background: rgba(0,0,0,0.55);
            color: #fff;
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 3px;
            pointer-events: none;
            z-index: 5;
        }

        .page select, .a4 select {
            font-size: 0.65rem;
            padding: 2px 4px;
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 3px;
            background: rgba(0,0,0,0.6);
            color: white;
            cursor: pointer;
        }
        .swap-input {
            width: 38px;
            font-size: 0.6rem;
            padding: 2px 3px;
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 3px;
            background: rgba(0,0,0,0.6);
            color: white;
            text-align: center;
        }
        .swap-input::placeholder { color: rgba(255,255,255,0.5); }
        .swap-btn {
            font-size: 0.6rem;
            padding: 2px 5px;
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 3px;
            background: rgba(0,0,0,0.6);
            color: white;
            cursor: pointer;
        }
        .swap-btn:hover { background: rgba(80,50,20,0.8); }
        .remove-btn {
            font-size: 0.55rem;
            padding: 2px 5px;
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 3px;
            background: rgba(180,50,50,0.7);
            color: white;
            cursor: pointer;
            white-space: nowrap;
        }
        .remove-btn:hover { background: rgba(200,30,30,0.9); }

        .spread-label {
            text-align: center;
            color: #aaa;
            font-size: 0.7rem;
            margin: -1rem auto 1.5rem;
            max-width: 960px;
        }

        @media print {
            body { padding: 0; background: white; }
            h1, .subtitle, .save-bar, .spread-label, .overlay, .undo-bar, .swap-bar, .layout-select { display: none !important; }
            .cover-wrap, .spread { box-shadow: none; max-width: 100%; }
            .a4 { box-shadow: none; break-after: page; height: 100vh; }
            .spread { break-after: avoid; }
        }
        @media (max-width: 600px) {
            body { padding: 0.5rem; }
            h1 { font-size: 1.4rem; }
            .spread { flex-direction: column; }
        }
    </style>
</head>

}

function saveRemoved(removedSet) {
    localStorage.setItem(REMOVED_KEY, JSON.stringify([...removedSet]));
}

function removeImage(id) {
    const removedSet = loadRemoved();
    removedSet.add(id);
    saveRemoved(removedSet);
    removedStack.push(id);
    updateUndoBar();
    render();
}

function undoRemove() {
    if (removedStack.length === 0) return;
    const id = removedStack.pop();
    const removedSet = loadRemoved();
    removedSet.delete(id);
    saveRemoved(removedSet);
    updateUndoBar();
    render();
}

function updateUndoBar() {
    const bar = document.getElementById('undo-bar');
    if (removedStack.length > 0) {
        const lastId = removedStack[removedStack.length - 1];
        document.getElementById('undo-text').textContent = `Poistettu: ${lastId}`;
        bar.classList.add('visible');
    } else {
        bar.classList.remove('visible');
    }
}

/* --- LAYOUTS (localStorage) --- */
const LAYOUT_KEY = 'akvarellit_layouts';

function loadLayouts() {
    try {
        const raw = localStorage.getItem(LAYOUT_KEY);
        if (raw) return JSON.parse(raw);
    } catch {}
    return [];
}

function saveLayoutsData(layouts) {
    localStorage.setItem(LAYOUT_KEY, JSON.stringify(layouts));
}

function setPageLayout(pageIdx, count) {
    const layouts = loadLayouts();
    while (layouts.length <= pageIdx) layouts.push(1);
    layouts[pageIdx] = count;
    saveLayoutsData(layouts);
    render();
}

/* --- SAVE TO FILE --- */
function saveToFile() {
    const data = {
        saved: new Date().toISOString(),
        order: loadOrder().map(img => img.id),
        removed: [...loadRemoved()],
        layouts: loadLayouts()
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'asetukset.json';
    a.click();
    URL.revokeObjectURL(a.href);
    document.getElementById('save-status').textContent = 'Tallennettu: asetukset.json';
    setTimeout(() => document.getElementById('save-status').textContent = '', 3000);
}

/* --- ORDER (localStorage) --- */
const ORDER_KEY = 'akvarellit_order';

function loadOrder() {
    try {
        const raw = localStorage.getItem(ORDER_KEY);
        if (raw) {
            const ids = JSON.parse(raw);
            const byId = {};
            catalog.forEach(img => byId[img.id] = img);
            const ordered = ids.map(id => byId[id]).filter(Boolean);
            const savedSet = new Set(ids);
            catalog.forEach(img => { if (!savedSet.has(img.id)) ordered.push(img); });
            return ordered;
        }
    } catch {}
    return [...catalog];
}

function saveOrder(ordered) {
    localStorage.setItem(ORDER_KEY, JSON.stringify(ordered.map(img => img.id)));
}

function doGlobalSwap() {
    const aVal = parseInt(document.getElementById('swap-a').value);
    const bVal = parseInt(document.getElementById('swap-b').value);
    const statusEl = document.getElementById('swap-status');
    if (!aVal || !bVal || aVal === bVal) {
        statusEl.textContent = 'Anna kaksi eri numeroa';
        return;
    }
    if (aVal < 1 || aVal > catalog.length || bVal < 1 || bVal > catalog.length) {
        statusEl.textContent = 'Numero 1\u2013' + catalog.length;
        return;
    }
    if (swapImages(aVal, bVal)) {
        statusEl.textContent = `AKV-${String(aVal).padStart(3,'0')} \u21C4 AKV-${String(bVal).padStart(3,'0')}`;
        document.getElementById('swap-a').value = '';
        document.getElementById('swap-b').value = '';
        render();
        setTimeout(() => statusEl.textContent = '', 3000);
    } else {
        statusEl.textContent = 'Vaihto epäonnistui';
    }
}

function swapImages(id1Num, id2Num) {
    const ordered = loadOrder();
    const idx1 = ordered.findIndex(img => img.id === 'AKV-' + String(id1Num).padStart(3, '0'));
    const idx2 = ordered.findIndex(img => img.id === 'AKV-' + String(id2Num).padStart(3, '0'));
    if (idx1 === -1 || idx2 === -1) return false;
    [ordered[idx1], ordered[idx2]] = [ordered[idx2], ordered[idx1]];
    saveOrder(ordered);
    return true;
}

/* --- HELPERS --- */
function makeOverlay(img) {
    const overlay = document.createElement('div');
    overlay.className = 'overlay';
    const swapInput = document.createElement('input');
    swapInput.className = 'swap-input';
    swapInput.type = 'text';
    swapInput.placeholder = '#';
    swapInput.title = 'Vaihda paikka: kirjoita toisen kuvan numero';
    const swapBtn = document.createElement('button');
    swapBtn.className = 'swap-btn';
    swapBtn.textContent = '\u21C4';
    swapBtn.title = 'Vaihda';
    const thisNum = parseInt(img.id.replace('AKV-', ''));
    function doSwap() {
        const target = parseInt(swapInput.value);
        if (target && target !== thisNum && target >= 1 && target <= catalog.length) {
            if (swapImages(thisNum, target)) render();
        }
    }
    swapInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); doSwap(); } });
    swapBtn.addEventListener('click', e => { e.stopPropagation(); doSwap(); });
    overlay.appendChild(swapInput);
    overlay.appendChild(swapBtn);

    const removeBtn = document.createElement('button');
    removeBtn.className = 'remove-btn';
    removeBtn.textContent = 'Poista';
    removeBtn.title = 'Poista kuva';
    removeBtn.addEventListener('click', e => { e.stopPropagation(); removeImage(img.id); });
    overlay.appendChild(removeBtn);

    return overlay;
}

function makeIdTag(img) {
    const t = document.createElement('span');
    t.className = 'id-tag';
    t.textContent = img.id;
    return t;
}

// Build a single A4 page element with 1, 2 or 3 images
// pageIdx = index in the layouts array (for the layout selector)
function buildA4(images, pageIdx, layoutCount) {
    const page = document.createElement('div');

    if (images.length === 1) {
        page.className = 'a4';
        const imgEl = document.createElement('img');
        imgEl.src = 'akvarellit/' + images[0].f;
        imgEl.alt = images[0].id;
        imgEl.loading = 'lazy';
        page.appendChild(imgEl);
        page.appendChild(makeOverlay(images[0]));
        page.appendChild(makeIdTag(images[0]));
    } else {
        page.className = 'a4 multi';
        images.forEach(img => {
            const slot = document.createElement('div');
            slot.className = 'img-slot';
            const imgEl = document.createElement('img');
            imgEl.src = 'akvarellit/' + img.f;
            imgEl.alt = img.id;
            imgEl.loading = 'lazy';
            slot.appendChild(imgEl);
            slot.appendChild(makeOverlay(img));
            slot.appendChild(makeIdTag(img));
            page.appendChild(slot);
        });
    }

    // Layout selector (1/2/3 images per page)
    if (pageIdx !== undefined) {
        const select = document.createElement('select');
        select.className = 'layout-select';
        [1, 2, 3].forEach(n => {
            const opt = document.createElement('option');
            opt.value = n;
            opt.textContent = n + (n === 1 ? ' kuva' : ' kuvaa');
            select.appendChild(opt);
        });
        select.value = layoutCount || images.length;
        select.addEventListener('change', () => {
            setPageLayout(pageIdx, parseInt(select.value));
        });
        page.appendChild(select);
    }

    return page;
}

/* --- DISTRIBUTE IMAGES ACROSS PAGES --- */
// Each page consumes 1, 2 or 3 images based on its layout setting.
// Returns array of { images: [...], layout: N, pageIdx: N }
function distributeImages(images, layouts) {
    const pages = [];
    let imgIdx = 0;
    let pageIdx = 0;

    while (imgIdx < images.length) {
        const layout = (pageIdx < layouts.length) ? layouts[pageIdx] : 1;
        const count = Math.min(layout, images.length - imgIdx);
        pages.push({
            images: images.slice(imgIdx, imgIdx + count),
            layout: layout,
            pageIdx: pageIdx
        });
        imgIdx += count;
        pageIdx++;
    }

    return pages;
}

/* --- RENDER --- */
function render() {
    const allImages = loadOrder();
    const removedSet = loadRemoved();
    const images = allImages.filter(img => !removedSet.has(img.id));
    const layouts = loadLayouts();
    const container = document.getElementById('book');
    container.innerHTML = '';

    const a4Pages = distributeImages(images, layouts);

    if (a4Pages.length === 0) return;

    // --- COVER (page index 0) ---
    const coverWrap = document.createElement('div');
    coverWrap.className = 'cover-wrap';
    coverWrap.appendChild(buildA4(a4Pages[0].images, a4Pages[0].pageIdx, a4Pages[0].layout));
    container.appendChild(coverWrap);

    const coverLabel = document.createElement('div');
    coverLabel.className = 'spread-label';
    coverLabel.textContent = 'Kansi (sivu 1)';
    container.appendChild(coverLabel);

    // --- SPREADS ---
    // Page 2 is always blank, then content pages follow
    const innerPages = a4Pages.slice(1, a4Pages.length - 1);
    // Prepend null for the blank page 2
    const spreadPages = [null, ...innerPages];

    for (let i = 0; i < spreadPages.length; i += 2) {
        const spread = document.createElement('div');
        spread.className = 'spread';

        // Left page
        if (spreadPages[i]) {
            const p = spreadPages[i];
            const leftPage = buildA4(p.images, p.pageIdx, p.layout);
            leftPage.classList.add('left');
            spread.appendChild(leftPage);
        } else {
            const empty = document.createElement('div');
            empty.className = 'a4 left';
            empty.style.background = '#fafafa';
            spread.appendChild(empty);
        }

        // Right page
        if (i + 1 < spreadPages.length && spreadPages[i + 1]) {
            const p = spreadPages[i + 1];
            spread.appendChild(buildA4(p.images, p.pageIdx, p.layout));
        } else {
            const empty = document.createElement('div');
            empty.className = 'a4';
            empty.style.background = '#fafafa';
            spread.appendChild(empty);
        }

        container.appendChild(spread);

        const label = document.createElement('div');
        label.className = 'spread-label';
        const leftNum = i + 2; // page 2 is blank, page 3 is first content
        const rightNum = i + 3;
        label.textContent = `Sivut ${leftNum}\u2013${rightNum}`;
        container.appendChild(label);
    }

    // --- BACK COVER ---
    if (a4Pages.length > 1) {
        const last = a4Pages[a4Pages.length - 1];
        const backWrap = document.createElement('div');
        backWrap.className = 'cover-wrap';
        backWrap.appendChild(buildA4(last.images, last.pageIdx, last.layout));
        container.appendChild(backWrap);

        const backLabel = document.createElement('div');
        backLabel.className = 'spread-label';
        backLabel.textContent = 'Takakansi';
        container.appendChild(backLabel);
    }

    const totalBookPages = 1 + 1 + spreadPages.length + 1; // cover + blank + inner + back
    document.getElementById('subtitle').textContent =
        `${images.length} maalausta \u2014 ${a4Pages.length} sivua sisältöä \u2014 kirjaladonta \u2014 2.5mm reunus`;
}

render();
</script>
